services:
  espresso-node-5:
    image: ghcr.io/espressosystems/espresso-network/espresso-node:${DOCKER_TAG:-main}
    ports:
      - "24005:24005"
    command: espresso-node -- http -- config -- query -- storage-fs
    # OLD-name vars: node-5 always starts on BASE_TAG; UPGRADE picks them up via env_compat.
    environment:
      - LIGHT_CLIENT_DB_PATH=/store/lc
      - ESPRESSO_SEQUENCER_GENESIS_FILE=${ESPRESSO_SEQUENCER_GENESIS_FILE:-genesis/demo.toml}
      - ESPRESSO_SEQUENCER_CDN_ENDPOINT=marshal-0:${ESPRESSO_CDN_SERVER_PORT}
      - ESPRESSO_SEQUENCER_API_PORT=24005
      - ESPRESSO_SEQUENCER_MAX_CONNECTIONS
      - ESPRESSO_SEQUENCER_STATE_PEERS=http://espresso-node-0:$ESPRESSO_NODE_0_API_PORT
      - ESPRESSO_SEQUENCER_API_PEERS=http://espresso-node-0:$ESPRESSO_NODE_0_API_PORT
      - ESPRESSO_SEQUENCER_CONFIG_PEERS=http://espresso-node-0:$ESPRESSO_NODE_0_API_PORT
      - ESPRESSO_SEQUENCER_STORAGE_PATH=/var/lib/espresso
      - ESPRESSO_SEQUENCER_L1_PROVIDER=http://demo-l1-network:${ESPRESSO_L1_PORT}
      - ESPRESSO_SEQUENCER_L1_POLLING_INTERVAL=${ESPRESSO_L1_POLLING_INTERVAL:-}
      - ESPRESSO_SEQUENCER_L1_EVENTS_MAX_BLOCK_RANGE=${ESPRESSO_L1_EVENTS_MAX_BLOCK_RANGE:-}
      - ESPRESSO_SEQUENCER_L1_STAKE_TABLE_UPDATE_INTERVAL
      - ESPRESSO_STATE_RELAY_SERVER_URL=http://state-relay-server:${ESPRESSO_STATE_RELAY_SERVER_PORT}
      # Keys injected at runtime via a per-run overlay generated by start_new_node_5.
      - ESPRESSO_SEQUENCER_LIBP2P_BIND_ADDRESS=0.0.0.0:7005
      - ESPRESSO_SEQUENCER_LIBP2P_ADVERTISE_ADDRESS=espresso-node-5:7005
      - ESPRESSO_SEQUENCER_CLIQUENET_BIND_ADDRESS=0.0.0.0:11005
      - ESPRESSO_SEQUENCER_IDENTITY_NODE_NAME=espresso-node-5
      - ESPRESSO_SEQUENCER_PUBLIC_API_URL=http://espresso-node-5:24005/
      - RUST_LOG
      - RUST_LOG_FORMAT
      - ASYNC_STD_THREAD_COUNT
    volumes:
      - espresso-node-5-storage:/var/lib/espresso

volumes:
  espresso-node-5-storage:
    name: espresso-node-5-storage
