# Compose override for the binary upgrade test.
#
# The 20260505 compose runs nodes 2, 3, 4 without any persistent storage:
# - node-2: command "espresso-node -- http" (no storage module at all)
# - node-3, 4: include "-- storage-fs" but write to ephemeral container layer
#
# When such a node is recreated for the binary roll, it has no cached config
# and the orchestrator returns 403 ("Network has been started manually, no
# longer registering new keys"), so the new container can't join. This
# override adds a named docker volume + STORAGE_PATH (both old and new env
# names) so each node persists its config across recreation. For node-2 we
# also add "-- storage-fs" to the command so the binary actually persists.
#
# Nodes 0, 1 already have postgres-backed storage and are not modified here.

services:
  espresso-node-2:
    command: espresso-node -- http -- storage-fs
    environment:
      ESPRESSO_SEQUENCER_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_NODE_STORAGE_PATH: /var/lib/espresso
    volumes:
      - espresso-node-2-storage:/var/lib/espresso

  espresso-node-3:
    environment:
      ESPRESSO_SEQUENCER_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_NODE_STORAGE_PATH: /var/lib/espresso
    volumes:
      - espresso-node-3-storage:/var/lib/espresso

  espresso-node-4:
    environment:
      ESPRESSO_SEQUENCER_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_NODE_STORAGE_PATH: /var/lib/espresso
    volumes:
      - espresso-node-4-storage:/var/lib/espresso

volumes:
  espresso-node-2-storage:
  espresso-node-3-storage:
  espresso-node-4-storage:
