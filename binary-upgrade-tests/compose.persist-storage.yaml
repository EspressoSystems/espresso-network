# Compose override for the binary upgrade test.
#
# Two unrelated fixes for BASE composes that pre-date current main:
#
# 1. Persistent storage on nodes 2, 3, 4. The 20260505 compose runs them
#    without it (node-2 has no storage module; nodes 3, 4 use storage-fs but
#    write to the ephemeral container layer). When a node is recreated for
#    the binary roll, it has no cached config and the orchestrator returns
#    403 ("Network has been started manually, no longer registering new
#    keys"), so the new container can't join. Named volumes + STORAGE_PATH
#    (old and new env names) keep config across recreation. For node-2 we
#    also add "-- storage-fs" to the command.
#
# 2. Light-client server module on nodes 0, 1 and rewired peer URLs.
#    The upgraded binary's query-module fetcher hits `/light-client/leaf/N`
#    via ESPRESSO_NODE_API_PEERS; the leaf-chain catchup path hits
#    `STATE_PEERS`. Neither endpoint exists on non-archival peers, so in the
#    BASE ring topology (0->1->4->...) the post-roll fetcher 404s during the
#    upgrade window. Backport b9702a786f's hub topology (all non-archival
#    nodes catch up via 0 and 1) and enable the light-client module on the
#    archival pair so the query fetcher actually finds the route.
#
# Nodes 0, 1 already have postgres-backed storage; only env + command edits.

services:
  espresso-node-0:
    command: espresso-node -- storage-sql -- http -- query -- submit -- hotshot-events -- config -- light-client
    environment:
      # Required for light-client catchup queries (a98a99f439); without it
      # the light-client SQLite falls back to :memory: per-connection and
      # serves empty results, so a wiped peer can't fetch historical leaves.
      LIGHT_CLIENT_DB_PATH: /store/lc
      ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT: ${ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT}

  espresso-node-1:
    command: espresso-node -- storage-sql -- http -- query -- explorer -- light-client
    environment:
      LIGHT_CLIENT_DB_PATH: /store/lc
      ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT: ${ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT}
      # OLD-name vars only; BASE's .env doesn't define the NEW-name port vars,
      # and the UPGRADE binary aliases OLD->NEW via env_compat on startup.
      # Multiple peers: with a single peer (node-0), the wiped node-1 chases a
      # moving target. node-0 is often the proposer so its indexer lags consensus
      # by a small but steady gap; each catchup request asks for the latest
      # consensus head's parent, which node-0 hasn't written yet, and by retry
      # time the head has moved on. Including non-proposing query peers (3, 4)
      # gives the catchup a faster-indexing fallback so it converges.
      ESPRESSO_SEQUENCER_API_PEERS: http://espresso-node-0:$ESPRESSO_SEQUENCER0_API_PORT,http://espresso-node-3:$ESPRESSO_SEQUENCER3_API_PORT,http://espresso-node-4:$ESPRESSO_SEQUENCER4_API_PORT
      ESPRESSO_SEQUENCER_STATE_PEERS: http://espresso-node-0:$ESPRESSO_SEQUENCER0_API_PORT,http://espresso-node-3:$ESPRESSO_SEQUENCER3_API_PORT,http://espresso-node-4:$ESPRESSO_SEQUENCER4_API_PORT

  # Add `status` (only requires `http`) so roll_node can poll node 2's block
  # height; it has no `query` module to expose /node/block-height.
  espresso-node-2:
    command: espresso-node -- http -- storage-fs -- status
    environment:
      ESPRESSO_SEQUENCER_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_NODE_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_SEQUENCER_STATE_PEERS: http://espresso-node-0:$ESPRESSO_SEQUENCER0_API_PORT,http://espresso-node-1:$ESPRESSO_SEQUENCER1_API_PORT
      ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT: ${ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT}
    volumes:
      - espresso-node-2-storage:/var/lib/espresso

  espresso-node-3:
    environment:
      ESPRESSO_SEQUENCER_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_NODE_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_SEQUENCER_STATE_PEERS: http://espresso-node-0:$ESPRESSO_SEQUENCER0_API_PORT,http://espresso-node-1:$ESPRESSO_SEQUENCER1_API_PORT
      ESPRESSO_SEQUENCER_API_PEERS: http://espresso-node-0:$ESPRESSO_SEQUENCER0_API_PORT,http://espresso-node-1:$ESPRESSO_SEQUENCER1_API_PORT
      ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT: ${ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT}
    volumes:
      - espresso-node-3-storage:/var/lib/espresso

  espresso-node-4:
    environment:
      ESPRESSO_SEQUENCER_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_NODE_STORAGE_PATH: /var/lib/espresso
      ESPRESSO_SEQUENCER_STATE_PEERS: http://espresso-node-0:$ESPRESSO_SEQUENCER0_API_PORT,http://espresso-node-1:$ESPRESSO_SEQUENCER1_API_PORT
      ESPRESSO_SEQUENCER_API_PEERS: http://espresso-node-0:$ESPRESSO_SEQUENCER0_API_PORT,http://espresso-node-1:$ESPRESSO_SEQUENCER1_API_PORT
      ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT: ${ESPRESSO_NODE_BOOTSTRAP_EPOCH_CATCHUP_TIMEOUT}
    volumes:
      - espresso-node-4-storage:/var/lib/espresso

volumes:
  espresso-node-2-storage:
    name: espresso-node-2-storage
  espresso-node-3-storage:
    name: espresso-node-3-storage
  espresso-node-4-storage:
    name: espresso-node-4-storage
