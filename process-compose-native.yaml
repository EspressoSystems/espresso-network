version: "3"

# Fully native (no-Docker) variant of process-compose.yaml, intended for memory
# profiling of real, separately-networked sequencer processes.
#
# Prereqs that must be on PATH:
#   - anvil (Foundry),
#   - process-compose.
#
# NETWORKING: the CDN (KeyDB + cdn-marshal + cdn-broker) is removed, so no KeyDB
# is required. Consensus runs over libp2p, the secondary of the node's
# CombinedNetwork. The CDN remains the *primary* and cannot be disabled, so each
# node logs recurring "Error on primary network" warnings as it retries the
# (absent) marshal - harmless, but it adds noise to logs and heap profiles. If
# you need clean profiles / faithful CDN networking, re-add the keydb/marshal_0/
# broker_0/broker_1/cdn-whitelist processes (with `keydb-server`, not redis) and
# their depends_on entries from process-compose.yaml.

environment:
  # The node requires a CDN endpoint, but no marshal runs here (CDN removed), so
  # this points at an unused port; the CDN client retries it harmlessly forever.
  - ESPRESSO_NODE_CDN_ENDPOINT=127.0.0.1:${ESPRESSO_CDN_SERVER_PORT}
  - ESPRESSO_NODE_ORCHESTRATOR_URL=http://localhost:${ESPRESSO_ORCHESTRATOR_PORT}
  - ESPRESSO_API_NODE_URL=http://localhost:${ESPRESSO_NODE_0_API_PORT}
  - ESPRESSO_API_NODE_URLS=http://localhost:${ESPRESSO_NODE_0_API_PORT},http://localhost:${ESPRESSO_NODE_1_API_PORT}
  - ESPRESSO_L1_PROVIDER=http://localhost:${ESPRESSO_L1_PORT}
  - ESPRESSO_NODE_GENESIS_FILE=${ESPRESSO_NODE_GENESIS_FILE:-data/genesis/demo.toml}
  - ESPRESSO_STATE_RELAY_SERVER_URL=http://localhost:${ESPRESSO_STATE_RELAY_SERVER_PORT}
  - QUERY_SERVICE_URI=http://localhost:${ESPRESSO_NODE_1_API_PORT}/v0/
  - NODE_VALIDATOR_URI=ws://localhost:${ESPRESSO_NODE_VALIDATOR_PORT}/v0/
processes:
  # Native L1: anvil replaces the geth-l1 container. The demo genesis uses chain
  # id 31337 (anvil's default) and the standard test mnemonic, so anvil is a
  # drop-in. --block-time 1 mirrors geth's --dev.period=1 so L1 blocks (and the
  # `finalized` tag the sequencer relies on) advance once per second. Anvil
  # serves HTTP and WS on the same port, so nodes referencing the WS provider
  # below point at ESPRESSO_L1_PORT rather than ESPRESSO_L1_WS_PORT.
  demo-l1-network:
    # --accounts 20 funds mnemonic indices 0-19 (the demo uses up to index 18,
    # the ESP token grant recipient), matching geth-config/genesis-default.json's
    # 20 prefunded accounts. Anvil only funds 10 by default, which leaves the
    # grant recipient with 0 ETH and breaks `stake-for-demo`.
    command: >-
      anvil --host 0.0.0.0 --port ${ESPRESSO_L1_PORT} --chain-id 31337
      --block-time 1 --accounts 20 --balance 1000000000
      --mnemonic "test test test test test test test test test test test junk"
    readiness_probe:
      exec:
        command: >-
          curl -H "Content-Type: application/json"
          --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}'
          http://localhost:${ESPRESSO_L1_PORT}
      failure_threshold: 6
      initial_delay_seconds: 5

  deploy-espresso-contracts:
    # The contract addresses are implicitly inherited from .env. We need to unset these or else the
    # script will think they're already deployed.
    command:
      unset
      ESPRESSO_FEE_CONTRACT_PROXY_ADDRESS
      ESP_TOKEN_PROXY_ADDRESS
      ESPRESSO_STAKE_TABLE_PROXY_ADDRESS
      && deploy --deploy-ops-timelock --deploy-safe-exit-timelock --deploy-fee-v1 --deploy-esp-token-v1 --deploy-stake-table-v1 --upgrade-stake-table-v2 --upgrade-stake-table-v3
    namespace: setup
    depends_on:
      demo-l1-network:
        condition: process_healthy

  deploy-prover-contracts:
    # The contract addresses are implicitly inherited from .env. We need to unset these or else the
    # script will think they're already deployed.
    command:
      unset ESPRESSO_LIGHT_CLIENT_PROXY_ADDRESS
      && deploy --use-mock --deploy-light-client-v1 --upgrade-light-client-v2
    namespace: setup
    depends_on:
      espresso-node-0:
        condition: process_healthy
      deploy-espresso-contracts:
        condition: process_completed

  wait-for-v4:
    command: |
      scripts/wait-for-header version 4
      scripts/wait-for-header new-epochs 1
    environment:
      - ESPRESSO_API_URL=http://localhost:${ESPRESSO_NODE_0_API_PORT}
    namespace: setup
    depends_on:
      deploy-prover-contracts:
        condition: process_completed

  # Wait for the prover to push the LC past the first epoch root before upgrading
  # to V3. Otherwise the LCv2 -> v3 transition can interrupt the epoch-root update
  # and leave the contract permanently stuck. Epochs are 1-indexed (genesis is
  # epoch 1), so we wait for epoch 2.
  wait-for-lc-epoch-2:
    command: scripts/wait-for-light-client-epoch 2
    namespace: setup
    environment:
      - L1_PROVIDER=http://localhost:${ESPRESSO_L1_PORT}
    depends_on:
      wait-for-v4:
        condition: process_completed
      prover-one-shot:
        condition: process_started

  deploy-lcv3-upgrade:
    command: deploy --upgrade-light-client-v3 --use-mock
    namespace: setup
    depends_on:
      wait-for-lc-epoch-2:
        condition: process_completed

  # Reward claims needs the LC to be deployed.
  deploy-pos-contracts-upgrades:
    command:
      unset ESPRESSO_REWARD_CLAIM_PROXY_ADDRESS
      && deploy --deploy-reward-claim-v1 --upgrade-esp-token-v2
    namespace: setup
    depends_on:
      demo-l1-network:
        condition: process_healthy
      deploy-lcv3-upgrade:
        condition: process_completed

  claim-rewards:
    command: scripts/claim-rewards-loop 10
    environment:
      - L1_PROVIDER=http://localhost:${ESPRESSO_L1_PORT}
      - STAKE_TABLE_ADDRESS=${ESPRESSO_STAKE_TABLE_PROXY_ADDRESS}
      - ESPRESSO_URL=http://localhost:24000
      - MNEMONIC
      - ACCOUNT_INDEX=20
    depends_on:
      deploy-pos-contracts-upgrades:
        condition: process_completed
      espresso-node-0:
        condition: process_healthy

  fund-builder:
    command: espresso-bridge deposit
    namespace: setup
    environment:
      - L1_PROVIDER=http://localhost:${ESPRESSO_L1_PORT}
      - L1_POLLING_INTERVAL=${ESPRESSO_L1_POLLING_INTERVAL}
      - ESPRESSO_PROVIDER=http://localhost:${ESPRESSO_NODE_1_API_PORT}
      - CONTRACT_ADDRESS=${ESPRESSO_FEE_CONTRACT_PROXY_ADDRESS}
      - MNEMONIC=${ESPRESSO_BUILDER_ETH_MNEMONIC}
      - ACCOUNT_INDEX=${ESPRESSO_BUILDER_ETH_ACCOUNT_INDEX}
      - AMOUNT=1000000000000000000
      - CONFIRMATIONS=1
    depends_on:
      deploy-espresso-contracts:
        condition: process_completed
      espresso-node-1:
        condition: process_healthy

  stake-for-demo:
    command: staking-cli --no-config stake-for-demo
    namespace: setup
    environment:
      - L1_PROVIDER=http://localhost:${ESPRESSO_L1_PORT}
      - MNEMONIC=${ESPRESSO_ETH_MNEMONIC}
      - ACCOUNT_INDEX=${ESP_TOKEN_INITIAL_GRANT_RECIPIENT_ACCOUNT_INDEX}
      - ESP_TOKEN_CONTRACT_ADDRESS=${ESP_TOKEN_PROXY_ADDRESS}
      - STAKE_TABLE_ADDRESS=${ESPRESSO_STAKE_TABLE_PROXY_ADDRESS}
    depends_on:
      deploy-espresso-contracts:
        condition: process_completed

  wait-for-l1-finalized:
    command: scripts/wait-for-l1-finalized
    namespace: setup
    environment:
      - L1_PROVIDER=http://localhost:${ESPRESSO_L1_PORT}
    depends_on:
      stake-for-demo:
        condition: process_completed

  orchestrator:
    command: orchestrator
    environment:
      - ESPRESSO_ORCHESTRATOR_BUILDER_URLS=http://localhost:${ESPRESSO_BUILDER_SERVER_PORT}
    readiness_probe:
      http_get:
        scheme: http
        host: localhost
        port: ${ESPRESSO_ORCHESTRATOR_PORT}
        path: /healthcheck
      initial_delay_seconds: 0
      period_seconds: 1
      timeout_seconds: 1
      success_threshold: 1
      failure_threshold: 100

  state-relay-server:
    command: state-relay-server
    readiness_probe:
      failure_threshold: 10
      period_seconds: 1
      http_get:
        scheme: http
        host: localhost
        port: ${ESPRESSO_STATE_RELAY_SERVER_PORT}
        path: /healthcheck

  prover-one-shot:
    # "nice" this compute heavy process to reduce load
    command: nice state-prover
    environment:
      - RAYON_NUM_THREADS=${PROVER_RAYON_NUM_THREADS}
      - ESPRESSO_STATE_PROVER_ONESHOT_RETRIES=1
      - RUST_LOG=${RUST_LOG},hotshot_state_prover=DEBUG
    depends_on:
      espresso-node-0:
        condition: process_healthy
      state-relay-server:
        condition: process_healthy
      demo-l1-network:
        condition: process_healthy
      deploy-prover-contracts:
        condition: process_completed
    availability:
      restart: always
      backoff_seconds: ${ESPRESSO_STATE_PROVER_UPDATE_INTERVAL_SECS}

  espresso-node-0:
    command: espresso-node-sqlite -- storage-sql -- http -- query -- submit -- hotshot-events -- config -- catchup -- light-client
    log_location: logs/sequencer0.log
    environment:
      - ESPRESSO_NODE_TELEMETRY_LOGS_ENABLE=true
      - ESPRESSO_NODE_TELEMETRY_METRICS_ENABLE=true
      - ESPRESSO_NODE_TELEMETRY_ENDPOINT=http://intentionally-unreachable-telemetry-endpoint
      - ESPRESSO_NODE_TELEMETRY_LOG=info
      - ESPRESSO_NODE_API_PORT=${ESPRESSO_NODE_0_API_PORT}
      - ESPRESSO_NODE_AXUM_PORT=${ESPRESSO_NODE_0_AXUM_PORT}
      - ESPRESSO_NODE_TONIC_PORT=${ESPRESSO_NODE_0_TONIC_PORT}
      - ESPRESSO_NODE_LIBP2P_BIND_ADDRESS=0.0.0.0:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_0}
      - ESPRESSO_NODE_LIBP2P_ADVERTISE_ADDRESS=localhost:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_0}
      - ESPRESSO_NODE_CLIQUENET_BIND_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_0}
      - ESPRESSO_NODE_CLIQUENET_ADVERTISE_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_0}
      - ESPRESSO_NODE_API_PEERS=http://localhost:${ESPRESSO_NODE_1_API_PORT}
      - ESPRESSO_NODE_STATE_PEERS=http://localhost:${ESPRESSO_NODE_1_API_PORT}
      - LIGHT_CLIENT_DB_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq0-lc
      - ESPRESSO_NODE_STORAGE_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq0
      - ESPRESSO_NODE_PRIVATE_STAKING_KEY=${ESPRESSO_DEMO_NODE_STAKING_PRIVATE_KEY_0}
      - ESPRESSO_NODE_PRIVATE_STATE_KEY=${ESPRESSO_DEMO_NODE_STATE_PRIVATE_KEY_0}
      - ESPRESSO_NODE_PRIVATE_X25519_KEY=${ESPRESSO_DEMO_NODE_X25519_PRIVATE_KEY_0}
      - ESPRESSO_NODE_IS_DA=true
      - ESPRESSO_NODE_IDENTITY_NODE_NAME=espresso-node-0
      - ESPRESSO_NODE_IDENTITY_WALLET_ADDRESS=0x0000000000000000000000000000000000000000
      - ESPRESSO_NODE_IDENTITY_COMPANY_NAME=Espresso Systems
      - ESPRESSO_NODE_IDENTITY_COMPANY_WEBSITE=https://www.espressosys.com/
      - ESPRESSO_NODE_IDENTITY_OPERATING_SYSTEM=Linux 5.15.153.1
      - ESPRESSO_NODE_IDENTITY_NETWORK_TYPE=local
      - ESPRESSO_NODE_IDENTITY_COUNTRY_CODE=US
      - ESPRESSO_NODE_IDENTITY_LATITUDE=40.7128
      - ESPRESSO_NODE_IDENTITY_LONGITUDE=-74.0060
      - ESPRESSO_NODE_PUBLIC_API_URL=http://localhost:${ESPRESSO_NODE_0_API_PORT}/
    depends_on:
      orchestrator:
        condition: process_healthy
      demo-l1-network:
        condition: process_healthy
      state-relay-server:
        condition: process_healthy
      stake-for-demo:
        condition: process_completed
      wait-for-l1-finalized:
        condition: process_completed

    readiness_probe:
      http_get:
        scheme: http
        host: localhost
        port: ${ESPRESSO_NODE_0_API_PORT}
        path: /healthcheck
      period_seconds: 1
      failure_threshold: 100

  espresso-node-1:
    # SQLite (embedded-db) instead of postgres. Anvil serves WS on the HTTP port,
    # so ESPRESSO_L1_WS_PROVIDER points at ESPRESSO_L1_PORT (not _WS_PORT).
    command: espresso-node-sqlite -- storage-sql -- http -- config -- query -- submit -- explorer -- catchup
    environment:
      - ESPRESSO_NODE_TELEMETRY_METRICS_ENABLE=true
      - ESPRESSO_NODE_TELEMETRY_ENDPOINT=http://localhost:${ESPRESSO_DEMO_TELEMETRY_PRW_PORT}
      - ESPRESSO_NODE_API_PORT=${ESPRESSO_NODE_1_API_PORT}
      - ESPRESSO_NODE_AXUM_PORT=${ESPRESSO_NODE_1_AXUM_PORT}
      - ESPRESSO_NODE_TONIC_PORT=${ESPRESSO_NODE_1_TONIC_PORT}
      - ESPRESSO_NODE_LIBP2P_BIND_ADDRESS=0.0.0.0:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_1}
      - ESPRESSO_NODE_LIBP2P_ADVERTISE_ADDRESS=localhost:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_1}
      - ESPRESSO_NODE_CLIQUENET_BIND_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_1}
      - ESPRESSO_NODE_CLIQUENET_ADVERTISE_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_1}
      - ESPRESSO_NODE_API_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT}
      - ESPRESSO_NODE_STATE_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT}
      - LIGHT_CLIENT_DB_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq1-lc
      - ESPRESSO_NODE_STORAGE_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq1
      - ESPRESSO_NODE_PRIVATE_STAKING_KEY=${ESPRESSO_DEMO_NODE_STAKING_PRIVATE_KEY_1}
      - ESPRESSO_NODE_PRIVATE_STATE_KEY=${ESPRESSO_DEMO_NODE_STATE_PRIVATE_KEY_1}
      - ESPRESSO_NODE_PRIVATE_X25519_KEY=${ESPRESSO_DEMO_NODE_X25519_PRIVATE_KEY_1}
      - ESPRESSO_NODE_IS_DA=true
      - ESPRESSO_NODE_IDENTITY_NODE_NAME=espresso-node-1
      - ESPRESSO_NODE_IDENTITY_WALLET_ADDRESS=0x0000000000000000000000000000000000000001
      - ESPRESSO_NODE_IDENTITY_COMPANY_NAME=Espresso Systems
      - ESPRESSO_NODE_IDENTITY_COMPANY_WEBSITE=https://www.espressosys.com/
      - ESPRESSO_NODE_IDENTITY_OPERATING_SYSTEM=Darwin 23.5.0
      - ESPRESSO_NODE_IDENTITY_NETWORK_TYPE=local
      - ESPRESSO_NODE_IDENTITY_COUNTRY_CODE=GR
      - ESPRESSO_NODE_IDENTITY_LATITUDE=39.0742
      - ESPRESSO_NODE_IDENTITY_LONGITUDE=21.8243
      - ESPRESSO_NODE_PUBLIC_API_URL=http://localhost:${ESPRESSO_NODE_1_API_PORT}/
      - ESPRESSO_L1_WS_PROVIDER=ws://localhost:${ESPRESSO_L1_PORT}
    depends_on:
      orchestrator:
        condition: process_healthy
      demo-l1-network:
        condition: process_healthy
      state-relay-server:
        condition: process_healthy
      stake-for-demo:
        condition: process_completed
      wait-for-l1-finalized:
        condition: process_completed
    readiness_probe:
      http_get:
        scheme: http
        host: localhost
        port: ${ESPRESSO_NODE_1_API_PORT}
        path: /healthcheck
      period_seconds: 1
      failure_threshold: 100

  espresso-node-2:
    command: espresso-node-sqlite -- http -- config
    environment:
      - ESPRESSO_NODE_API_PORT=${ESPRESSO_NODE_2_API_PORT}
      - ESPRESSO_NODE_AXUM_PORT=${ESPRESSO_NODE_2_AXUM_PORT}
      - ESPRESSO_NODE_TONIC_PORT=${ESPRESSO_NODE_2_TONIC_PORT}
      - ESPRESSO_NODE_LIBP2P_BIND_ADDRESS=0.0.0.0:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_2}
      - ESPRESSO_NODE_LIBP2P_ADVERTISE_ADDRESS=localhost:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_2}
      - ESPRESSO_NODE_CLIQUENET_BIND_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_2}
      - ESPRESSO_NODE_CLIQUENET_ADVERTISE_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_2}
      - ESPRESSO_NODE_STATE_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT},http://localhost:${ESPRESSO_NODE_1_API_PORT}
      - ESPRESSO_NODE_API_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT}
      - ESPRESSO_NODE_STORAGE_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq2
      - LIGHT_CLIENT_DB_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq2-lc
      - ESPRESSO_NODE_PRIVATE_STAKING_KEY=${ESPRESSO_DEMO_NODE_STAKING_PRIVATE_KEY_2}
      - ESPRESSO_NODE_PRIVATE_STATE_KEY=${ESPRESSO_DEMO_NODE_STATE_PRIVATE_KEY_2}
      - ESPRESSO_NODE_PRIVATE_X25519_KEY=${ESPRESSO_DEMO_NODE_X25519_PRIVATE_KEY_2}
      - ESPRESSO_NODE_IS_DA=true
      - ESPRESSO_NODE_IDENTITY_NODE_NAME=espresso-node-2
      - ESPRESSO_NODE_IDENTITY_WALLET_ADDRESS=0x0000000000000000000000000000000000000002
      - ESPRESSO_NODE_IDENTITY_COMPANY_NAME=Espresso Systems
      - ESPRESSO_NODE_IDENTITY_COMPANY_WEBSITE=https://www.espressosys.com/
      - ESPRESSO_NODE_IDENTITY_OPERATING_SYSTEM=Darwin 23.5.0
      - ESPRESSO_NODE_IDENTITY_NETWORK_TYPE=local
      - ESPRESSO_NODE_IDENTITY_COUNTRY_CODE=CN
      - ESPRESSO_NODE_IDENTITY_LATITUDE=35.8617
      - ESPRESSO_NODE_IDENTITY_LONGITUDE=104.1954
      - ESPRESSO_NODE_PUBLIC_API_URL=http://localhost:${ESPRESSO_NODE_2_API_PORT}/
    depends_on:
      orchestrator:
        condition: process_healthy
      demo-l1-network:
        condition: process_healthy
      state-relay-server:
        condition: process_healthy
      stake-for-demo:
        condition: process_completed
      wait-for-l1-finalized:
        condition: process_completed
    readiness_probe:
      http_get:
        scheme: http
        host: localhost
        port: ${ESPRESSO_NODE_2_API_PORT}
        path: /healthcheck
      failure_threshold: 100
      period_seconds: 1

  espresso-node-3:
    command: espresso-node-sqlite -- http -- config -- query -- storage-fs
    environment:
      - ESPRESSO_NODE_TELEMETRY_LOGS_ENABLE=true
      - ESPRESSO_NODE_TELEMETRY_ENDPOINT=http://localhost:${ESPRESSO_DEMO_TELEMETRY_OTLP_PORT}
      - ESPRESSO_NODE_TELEMETRY_LOG=info
      - ESPRESSO_NODE_API_PORT=${ESPRESSO_NODE_3_API_PORT}
      - ESPRESSO_NODE_AXUM_PORT=${ESPRESSO_NODE_3_AXUM_PORT}
      - ESPRESSO_NODE_TONIC_PORT=${ESPRESSO_NODE_3_TONIC_PORT}
      - ESPRESSO_NODE_LIBP2P_BIND_ADDRESS=0.0.0.0:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_3}
      - ESPRESSO_NODE_LIBP2P_ADVERTISE_ADDRESS=localhost:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_3}
      - ESPRESSO_NODE_CLIQUENET_BIND_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_3}
      - ESPRESSO_NODE_CLIQUENET_ADVERTISE_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_3}
      - ESPRESSO_NODE_STATE_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT},http://localhost:${ESPRESSO_NODE_1_API_PORT}
      - ESPRESSO_NODE_API_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT}
      - ESPRESSO_NODE_STORAGE_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq3
      - LIGHT_CLIENT_DB_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq3-lc
      - ESPRESSO_NODE_PRIVATE_STAKING_KEY=${ESPRESSO_DEMO_NODE_STAKING_PRIVATE_KEY_3}
      - ESPRESSO_NODE_PRIVATE_STATE_KEY=${ESPRESSO_DEMO_NODE_STATE_PRIVATE_KEY_3}
      - ESPRESSO_NODE_PRIVATE_X25519_KEY=${ESPRESSO_DEMO_NODE_X25519_PRIVATE_KEY_3}
      - ESPRESSO_NODE_IDENTITY_NODE_NAME=espresso-node-3
      - ESPRESSO_NODE_IDENTITY_WALLET_ADDRESS=0x0000000000000000000000000000000000000003
      - ESPRESSO_NODE_IDENTITY_COMPANY_NAME=Espresso Systems
      - ESPRESSO_NODE_IDENTITY_COMPANY_WEBSITE=https://www.espressosys.com/
      - ESPRESSO_NODE_IDENTITY_OPERATING_SYSTEM=Microsoft Windows NT 10.0.22621.0
      - ESPRESSO_NODE_IDENTITY_NETWORK_TYPE=local
      - ESPRESSO_NODE_IDENTITY_COUNTRY_CODE=CN
      - ESPRESSO_NODE_IDENTITY_LATITUDE=35.8617
      - ESPRESSO_NODE_IDENTITY_LONGITUDE=104.1954
      - ESPRESSO_NODE_PUBLIC_API_URL=http://localhost:${ESPRESSO_NODE_3_API_PORT}/
      - ESPRESSO_L1_WS_PROVIDER=ws://localhost:${ESPRESSO_L1_PORT}
    depends_on:
      orchestrator:
        condition: process_healthy
      demo-l1-network:
        condition: process_healthy
      state-relay-server:
        condition: process_healthy
      stake-for-demo:
        condition: process_completed
      wait-for-l1-finalized:
        condition: process_completed
    readiness_probe:
      http_get:
        scheme: http
        host: localhost
        port: ${ESPRESSO_NODE_3_API_PORT}
        path: /healthcheck
      failure_threshold: 100
      period_seconds: 1

  espresso-node-4:
    command: espresso-node-sqlite -- storage-sql -- http -- config -- query
    environment:
      - ESPRESSO_NODE_LIGHTWEIGHT=true
      - ESPRESSO_NODE_API_PORT=${ESPRESSO_NODE_4_API_PORT}
      - ESPRESSO_NODE_AXUM_PORT=${ESPRESSO_NODE_4_AXUM_PORT}
      - ESPRESSO_NODE_TONIC_PORT=${ESPRESSO_NODE_4_TONIC_PORT}
      - ESPRESSO_NODE_STATE_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT},http://localhost:${ESPRESSO_NODE_1_API_PORT}
      - ESPRESSO_NODE_API_PEERS=http://localhost:${ESPRESSO_NODE_0_API_PORT}
      - ESPRESSO_NODE_LIBP2P_BIND_ADDRESS=0.0.0.0:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_4}
      - ESPRESSO_NODE_LIBP2P_ADVERTISE_ADDRESS=localhost:${ESPRESSO_DEMO_NODE_LIBP2P_PORT_4}
      - ESPRESSO_NODE_CLIQUENET_BIND_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_4}
      - ESPRESSO_NODE_CLIQUENET_ADVERTISE_ADDRESS=127.0.0.1:${ESPRESSO_DEMO_NODE_CLIQUENET_PORT_4}
      - ESPRESSO_NODE_STORAGE_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq4
      - LIGHT_CLIENT_DB_PATH=${ESPRESSO_BASE_STORAGE_PATH}/seq4-lc
      - ESPRESSO_NODE_PRIVATE_STAKING_KEY=${ESPRESSO_DEMO_NODE_STAKING_PRIVATE_KEY_4}
      - ESPRESSO_NODE_PRIVATE_STATE_KEY=${ESPRESSO_DEMO_NODE_STATE_PRIVATE_KEY_4}
      - ESPRESSO_NODE_PRIVATE_X25519_KEY=${ESPRESSO_DEMO_NODE_X25519_PRIVATE_KEY_4}
      - ESPRESSO_NODE_IDENTITY_NODE_NAME=espresso-node-4
      - ESPRESSO_NODE_IDENTITY_WALLET_ADDRESS=0x0000000000000000000000000000000000000004
      - ESPRESSO_NODE_IDENTITY_COMPANY_NAME=Espresso Systems
      - ESPRESSO_NODE_IDENTITY_COMPANY_WEBSITE=https://www.espressosys.com/
      - ESPRESSO_NODE_IDENTITY_OPERATING_SYSTEM=TempleOS 5.03
      - ESPRESSO_NODE_IDENTITY_NETWORK_TYPE=local
      - ESPRESSO_NODE_IDENTITY_COUNTRY_CODE=AU
      - ESPRESSO_NODE_IDENTITY_LATITUDE=-25.2744
      - ESPRESSO_NODE_IDENTITY_LONGITUDE=133.7751
