[package]
name = "espresso-types"
version = "0.1.0"
authors = ["Espresso Systems <hello@espressosys.com>"]
edition.workspace = true

[package.metadata.cargo-machete]
ignored = ["base64_bytes", "hotshot_testing"]

# TODO: fix comments so doctests don't fail
[lib]
doctest = false

[features]
default = ["node"]
# L1 client, consensus persistence and networking integration; disable for
# constrained targets (e.g. SP1 zkVM).
node = [
    "alloy/default",
    "alloy/getrandom",
    "alloy/json-rpc",
    "alloy/node-bindings",
    "alloy/provider-ws",
    "alloy/signer-ledger",
    "dep:hotshot",
    "dep:hotshot-libp2p-networking",
    "dep:hotshot-new-protocol",
    "espresso-utils/full",
    "hotshot-query-service-types/default",
]
testing = ["dep:hotshot-example-types", "hotshot-query-service-types/testing", "node"]
rlp = ["alloy-rlp"]

[dependencies]
# Direct declaration (not workspace) so SP1 zkVM builds can drop the default
# reqwest/ws transports; the node feature restores the workspace feature set.
alloy = { version = "1.0", default-features = false, features = [
    "contract",
    "eips",
    "rpc-types",
    "serde",
    "signer-local",
    "signer-mnemonic",
    "sol-types",
] }
alloy-compat = { workspace = true }
alloy-rlp = { workspace = true, optional = true }
anyhow = { workspace = true }
ark-ec = { workspace = true }
ark-serialize = { workspace = true }
ark-std = { workspace = true }
async-broadcast = { workspace = true }
async-lock = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
base64-bytes = { workspace = true }
bigdecimal = { workspace = true }
bincode = { workspace = true }
blake3 = { workspace = true }
bytesize = { workspace = true }
clap = { workspace = true }
cld = { workspace = true }
committable = { workspace = true }
derive_more = { workspace = true }
either = { workspace = true }
# Direct declaration: default-features = false is ignored on workspace-inherited deps.
espresso-utils = { path = "../utils", default-features = false }
ethers-core = { workspace = true }
futures = { workspace = true }
hotshot = { workspace = true, optional = true }
hotshot-contract-adapter = { workspace = true }
hotshot-example-types = { workspace = true, optional = true }
hotshot-libp2p-networking = { workspace = true, optional = true }
hotshot-new-protocol = { workspace = true, optional = true }
# Direct declaration: default-features = false is ignored on workspace-inherited deps.
hotshot-query-service-types = { path = "../../../hotshot-query-service-types", default-features = false }
hotshot-types = { workspace = true }
humantime = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
jf-advz = { workspace = true }
jf-merkle-tree-compat = { workspace = true }
jf-utils = { workspace = true }                    # TODO temporary: used only for test_rng()
lru = { workspace = true }
moka = { workspace = true }
num-traits = { workspace = true }
parking_lot = { workspace = true }
paste = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
serde_bytes = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }                        # TODO temporary, used only for VID, should be set in hotshot
sha3 = { workspace = true }
static_assertions = { workspace = true }
tagged-base64 = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["formatting", "macros", "parsing"] }
tokio = { workspace = true }
tower-service = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
vbs = { workspace = true }
vec1 = { workspace = true }
versions = { workspace = true }
vid = { workspace = true }

[dev-dependencies]
criterion = "0.5"
espresso-contract-deployer = { workspace = true }
espresso-types = { path = ".", features = ["testing"] }
fluent-asserter = { workspace = true }
hotshot-example-types = { workspace = true }
hotshot-query-service = { workspace = true, features = ["testing"] }
insta = { workspace = true }
pretty_assertions = { workspace = true }
proptest = { workspace = true }
rand_chacha = { workspace = true }
rstest = { workspace = true }
rstest_reuse = { workspace = true }
test-log = { workspace = true }
test-utils = { workspace = true }

[[bench]]
name = "reward_mt"
harness = false

[lints]
workspace = true
