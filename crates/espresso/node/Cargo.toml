[package]
name = "espresso-node"
version = "0.1.0"
authors = ["Espresso Systems <hello@espressosys.com>"]
edition.workspace = true

[lib]
name = "espresso_node"
path = "src/lib.rs"

[package.metadata.cargo-udeps.ignore]
normal = ["hotshot-testing"]

[package.metadata.cargo-machete]
ignored = ["vergen", "vergen-gitcl", "include_dir", "hotshot_builder_api"]

[features]
testing = [
    "hotshot-testing",
    "espresso-types/testing",
    "light-client/testing",
    "espresso-utils/testing",
    "hotshot-query-service/testing",
]
benchmarking = []
embedded-db = ["hotshot-query-service/embedded-db", "sqlx/sqlite"]

[dependencies]
alloy = { workspace = true }
anyhow = { workspace = true }
ark-ff = { workspace = true }
ark-serialize = { workspace = true }
async-channel = { workspace = true }
async-lock = { workspace = true }
async-once-cell = { workspace = true }
async-trait = { workspace = true }
bincode = { workspace = true }
blake3 = { workspace = true }
byteorder = { workspace = true }
cdn-broker = { workspace = true }
cdn-marshal = { workspace = true }
clap = { workspace = true }
client = { workspace = true }
committable = { workspace = true }
csv = { workspace = true }
derivative = { workspace = true }
derive_more = { workspace = true }
dotenvy = { workspace = true }
either = { workspace = true }
espresso-contract-deployer = { workspace = true }
espresso-api = { path = "../api" }
espresso-types = { workspace = true }
futures = { workspace = true }
generic-tests = { workspace = true }
hotshot = { workspace = true }
hotshot-builder-refactored = { workspace = true }
hotshot-contract-adapter = { workspace = true }
hotshot-events-service = { workspace = true }
hotshot-libp2p-networking = { workspace = true }
hotshot-orchestrator = { workspace = true }
hotshot-query-service = { workspace = true }
hotshot-state-prover = { workspace = true }
hotshot-task-impls = { workspace = true }
hotshot-testing = { workspace = true, optional = true }
hotshot-types = { workspace = true }
include_dir = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
jf-advz = { workspace = true }
jf-crhf = { workspace = true }
jf-merkle-tree-compat = { workspace = true }
jf-rescue = { workspace = true }
jf-signature = { workspace = true }
libp2p = { workspace = true }
