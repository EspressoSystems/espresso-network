name: Backport merged pull request
on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to backport"
        required: true
        type: string
      target_branch:
        description: "Target branch"
        required: true
        type: string
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  backport:
    name: Backport pull request
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged &&
       !startsWith(github.event.pull_request.head.ref, 'backport-'))
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt

      - uses: taiki-e/install-action@just

      - uses: taiki-e/install-action@v2
        with:
          tool: mergiraf

      - name: Configure git identity and mergiraf merge driver
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git config --global merge.mergiraf.name mergiraf
          git config --global merge.mergiraf.driver 'mergiraf merge --git %O %A %B -s %S -x %X -y %Y -p %P'
          mkdir -p ~/.config/git
          echo '* merge=mergiraf' > ~/.config/git/attributes

      - name: Cherry-pick via workflow_dispatch
        id: dispatch_backport
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          scripts/backport-dispatch "$PR_NUMBER" "$TARGET_BRANCH"

      - name: Create backport pull requests
        id: backport
        if: github.event_name == 'pull_request_target'
        uses: korthout/backport-action@v3
        with:
          experimental: '{"conflict_resolution":"draft_commit_conflicts"}'

      - name: Detect remaining conflicts
        id: resolve
        if: |
          steps.backport.outputs.created_pull_numbers != '' ||
          steps.dispatch_backport.outputs.created_pull_numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_numbers="${{ steps.backport.outputs.created_pull_numbers }} ${{ steps.dispatch_backport.outputs.created_pull_numbers }}"
          needs_claude=""
          for pr in $pr_numbers; do
            branch=$(gh pr view "$pr" --json headRefName -q .headRefName)
            git fetch origin "$branch"
            if git grep -lE '^<<<<<<< ' "origin/$branch" -- >/dev/null; then
              needs_claude="$needs_claude $pr"
            else
              gh pr ready "$pr" || true
            fi
          done
          echo "needs_claude=$needs_claude" >> "$GITHUB_OUTPUT"

      - name: Claude conflict resolution
        if: steps.resolve.outputs.needs_claude != ''
        timeout-minutes: 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEEDS_CLAUDE: ${{ steps.resolve.outputs.needs_claude }}
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          # Prompt body lives in .github/claude/backport-resolve.md.
          prompt=$(printf 'Mergiraf left conflict markers in these backport PRs:\n%s\n\n%s' \
            "$NEEDS_CLAUDE" "$(cat .github/claude/backport-resolve.md)")
          claude -p "$prompt" --model claude-opus-4-8 --dangerously-skip-permissions

      - name: Install protoc
        if: steps.resolve.outputs.needs_claude != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        if: steps.resolve.outputs.needs_claude != ''
        with:
          prefix-key: v3-rust
          shared-key: backport-claude

      - name: Verify Claude-resolved backports compile, label, mark ready
        if: steps.resolve.outputs.needs_claude != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh label create claude-resolved --color FF6B35 --description "Backport conflicts resolved by Claude" 2>/dev/null || true
          for pr in ${{ steps.resolve.outputs.needs_claude }}; do
            branch=$(gh pr view "$pr" --json headRefName -q .headRefName)
            git checkout "$branch"
            cargo check --tests --examples
            git push origin "$branch"
            gh pr edit "$pr" --add-label claude-resolved
            gh pr ready "$pr"
            if [ -f "claude-summaries/$pr.md" ]; then
              gh pr comment "$pr" --body-file "claude-summaries/$pr.md"
            fi
          done

  # Tick the corresponding backport-candidates entry on the release tracker
  # issue when a backport PR itself lands on a release-X.Y.Z branch. Runs
  # alongside the main `backport` job above but on a different filter.
  tick-tracker:
    name: Tick release tracker
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged &&
      startsWith(github.event.pull_request.head.ref, 'backport-')
    steps:
      - name: Resolve original PR and target tracker
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # Branch name pattern from korthout/backport-action and scripts/backport-dispatch:
          #   backport-<PR>-to-<target-branch>
          orig=$(printf '%s' "$HEAD_REF" | sed -nE 's|^backport-([0-9]+)-to-.*$|\1|p')
          if [ -z "$orig" ]; then
            echo "head ref '$HEAD_REF' does not parse; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! echo "$BASE_REF" | grep -qE '^release-[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "base ref '$BASE_REF' is not a canonical release branch; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          version="${BASE_REF#release-}"
          merge_sha=$(gh pr view "$orig" --json mergeCommit -q .mergeCommit.oid 2>/dev/null || true)
          if [ -z "$merge_sha" ] || [ "$merge_sha" = "null" ]; then
            echo "original PR #$orig has no merge commit; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          issue=$(gh issue list --label release-tracker --state open \
            --search "Release $version in:title" --json number,title \
            -q ".[] | select(.title == \"Release $version\") | .number" | head -n1)
          if [ -z "$issue" ]; then
            echo "no open tracker for Release $version; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "skip=false"     >> "$GITHUB_OUTPUT"
          echo "sha=$merge_sha"  >> "$GITHUB_OUTPUT"
          echo "issue=$issue"    >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.meta.outputs.skip == 'false'

      - name: Tick the box
        if: steps.meta.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ steps.meta.outputs.issue }}
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          python3 scripts/release-tracker.py --issue "$ISSUE" tick \
            --section BACKPORT_CANDIDATES --sha "$SHA"
