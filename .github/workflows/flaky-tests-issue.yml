name: Flaky test tracker

on:
  workflow_dispatch:
  # Refresh the flaky-test tracking issue once a day.
  schedule:
    - cron: "0 6 * * *"
  # Run on PRs that touch the tooling so changes can be exercised end to end.
  pull_request:
    paths:
      - scripts/nextest-ci
      - .github/workflows/flaky-tests-issue.yml

# Serialize runs so two upserts cannot both create the issue.
concurrency:
  group: flaky-tests-issue

jobs:
  update-issue:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Fetch main test stats
        run: |
          python3 scripts/nextest-ci stats-fetch \
            --workflow test.yml \
            --artifact-name test-stats-test \
            --out main-test-stats.json

      - name: Fetch main hotshot stats
        run: |
          python3 scripts/nextest-ci stats-fetch \
            --workflow hotshot.yml \
            --artifact-name test-stats-hotshot \
            --out main-hotshot-stats.json

      - name: Update flaky test issue
        run: |
          python3 scripts/nextest-ci flaky-issue \
            --update \
            --stats "hotshot:main-hotshot-stats.json" \
            --stats "espresso:main-test-stats.json"
