# STATUS: draft, in testing
name: Promote Docker Tag

on:
  workflow_dispatch:
    inputs:
      floating-tag:
        description: Floating tag to update
        required: true
        type: choice
        options:
          - decaf.canary
          - decaf
          - mainnet.canary
          - mainnet
      release-tag:
        description: Source git tag (e.g. 0.4.0.5)
        required: true
        type: string
      skip-progression:
        description: Skip progression check (for hotfixes)
        required: false
        type: boolean
        default: false
      tracker-issue:
        description: Issue number of the tracker that dispatched this promotion (for status comments). Leave empty when running manually.
        required: false
        type: string
        default: ""

permissions:
  # Re-tagging via `docker buildx imagetools create` pushes a manifest, which
  # requires write access to the package. `issues: write` lets the dispatched
  # run post its own URL back to the tracker (no polling needed in the
  # dispatcher since the REST dispatches endpoint doesn't return a run id).
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io/espressosystems/espresso-network
  REFERENCE_SERVICE: espresso-node

jobs:
  check-progression:
    runs-on: ubuntu-latest
    steps:
      - name: Link this run on the tracker
        if: inputs.tracker-issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ inputs.tracker-issue }}
          TAG: ${{ inputs.release-tag }}
          STAGE: ${{ inputs.floating-tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE" --body \
            "Promotion of \`$TAG\` → \`$STAGE\` started: $RUN_URL"

      - name: Validate inputs
        env:
          TAG: ${{ inputs.release-tag }}
          STAGE: ${{ inputs.floating-tag }}
        run: |
          set -euo pipefail
          if ! echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::release-tag must match MAJOR.MINOR.PHASE.PATCH (e.g. 0.4.0.5)"
            exit 1
          fi
          # type: choice is only enforced in the web UI; re-validate here so
          # `gh workflow run -f floating-tag=foo` can't reach the promote job
          # with an unconfigured (= unprotected) environment.
          case "$STAGE" in
            decaf.canary|decaf|mainnet.canary|mainnet) ;;
            *)
              echo "::error::floating-tag must be one of decaf.canary, decaf, mainnet.canary, mainnet (got '$STAGE')"
              exit 1
              ;;
          esac

      - name: Login to Github Container Repo
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/login-action@v3
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/setup-buildx-action@v3
          attempt_limit: 3
          attempt_delay: 10000

      - name: Verify source image exists
        env:
          TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$REGISTRY/$REFERENCE_SERVICE:$TAG"

      - name: Check promotion progression
        if: ${{ !inputs.skip-progression }}
        env:
          RELEASE_GIT_TAG: ${{ inputs.release-tag }}
          FLOATING_DOCKER_TAG: ${{ inputs.floating-tag }}
        run: |
          set -euo pipefail

          # Compare amd64 manifest digests (the index digest isn't in --raw
          # output). Echoes empty on any failure (tag missing, single-arch
          # image, malformed JSON) — callers check for that explicitly so
          # pipefail can't turn a missing-tag into an opaque exit 1.
          get_digest() {
            local tag="$1" raw
            raw=$(docker buildx imagetools inspect --raw "$REGISTRY/$REFERENCE_SERVICE:$tag" 2>/dev/null) || return 0
            printf '%s' "$raw" \
              | jq -r '.manifests[]? | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' \
              2>/dev/null || true
          }

          require_promoted_to() {
            local prerequisite="$1" required release
            required=$(get_digest "$prerequisite")
            if [ -z "$required" ]; then
              echo "::error::Floating tag \`$prerequisite\` doesn't exist yet — promote there first before \`$FLOATING_DOCKER_TAG\`."
              exit 1
            fi
            release=$(get_digest "$RELEASE_GIT_TAG")
            if [ -z "$release" ]; then
              echo "::error::Could not resolve digest for release tag \`$RELEASE_GIT_TAG\`."
              exit 1
            fi
            if [ "$release" != "$required" ]; then
              echo "::error::Release \`$RELEASE_GIT_TAG\` ($release) doesn't match \`$prerequisite\` ($required); promote \`$RELEASE_GIT_TAG\` to \`$prerequisite\` first."
              exit 1
            fi
            echo "ok: \`$RELEASE_GIT_TAG\` already promoted to \`$prerequisite\`"
          }

          case "$FLOATING_DOCKER_TAG" in
            decaf.canary)    echo "no prerequisite for decaf.canary" ;;
            decaf)           require_promoted_to "decaf.canary" ;;
            mainnet.canary)  require_promoted_to "decaf" ;;
            mainnet)         require_promoted_to "mainnet.canary" ;;
          esac

  promote:
    needs: check-progression
    runs-on: ubuntu-latest
    # Reviewer count per stage is configured in repo Settings → Environments
    # (decaf.canary / decaf / mainnet.canary / mainnet). "Prevent self-review" must be
    # enabled on each so the requester cannot approve their own promotion.
    environment: ${{ inputs.floating-tag }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - bridge
          - builder
          - cdn-broker
          - cdn-marshal
          - cdn-whitelist
          - deploy
          - espresso-dev-node
          - nasty-client
          - node-validator
          - orchestrator
          - prover-service
          - espresso-node
          - staking-cli
          - state-relay-server
          - submit-transactions
    steps:
      - name: Login to Github Container Repo
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/login-action@v3
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/setup-buildx-action@v3
          attempt_limit: 3
          attempt_delay: 10000

      - name: Re-tag image
        env:
          SERVICE: ${{ matrix.service }}
          FLOATING_DOCKER_TAG: ${{ inputs.floating-tag }}
          RELEASE_GIT_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools create -t "$REGISTRY/$SERVICE:$FLOATING_DOCKER_TAG" "$REGISTRY/$SERVICE:$RELEASE_GIT_TAG"
