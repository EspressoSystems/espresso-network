# STATUS: draft, in testing
name: Promote Docker Tag

on:
  workflow_dispatch:
    inputs:
      floating-tag:
        description: Floating tag to update
        required: true
        type: choice
        options:
          - decaf.canary
          - decaf
          - mainnet.canary
          - mainnet
      release-tag:
        description: Source git tag (e.g. 0.4.0.5)
        required: true
        type: string
      tracker-issue:
        description: Issue number of the tracker that dispatched this promotion (for status comments). Leave empty when running manually.
        required: false
        type: string
        default: ""

permissions:
  # Re-tagging via `docker buildx imagetools create` pushes a manifest, which
  # requires write access to the package. `issues: write` lets the dispatched
  # run post its own URL back to the tracker (no polling needed in the
  # dispatcher since the REST dispatches endpoint doesn't return a run id).
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io/espressosystems/espresso-network
  REFERENCE_SERVICE: espresso-node

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Link this run on the tracker
        if: inputs.tracker-issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ inputs.tracker-issue }}
          TAG: ${{ inputs.release-tag }}
          STAGE: ${{ inputs.floating-tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE" --body \
            "Promotion of \`$TAG\` → \`$STAGE\` started: $RUN_URL"

      - name: Validate inputs
        env:
          TAG: ${{ inputs.release-tag }}
          STAGE: ${{ inputs.floating-tag }}
        run: |
          set -euo pipefail
          if ! echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::release-tag must match MAJOR.MINOR.PHASE.PATCH (e.g. 0.4.0.5)"
            exit 1
          fi
          # type: choice is only enforced in the web UI; re-validate here so
          # `gh workflow run -f floating-tag=foo` can't reach the promote job
          # with an unconfigured (= unprotected) environment.
          case "$STAGE" in
            decaf.canary|decaf|mainnet.canary|mainnet) ;;
            *)
              echo "::error::floating-tag must be one of decaf.canary, decaf, mainnet.canary, mainnet (got '$STAGE')"
              exit 1
              ;;
          esac

      - name: Login to Github Container Repo
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/login-action@v3
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/setup-buildx-action@v3
          attempt_limit: 3
          attempt_delay: 10000

      - name: Verify source image exists
        env:
          TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$REGISTRY/$REFERENCE_SERVICE:$TAG"


  promote:
    needs: verify
    runs-on: ubuntu-latest
    # Reviewer count per stage is configured in repo Settings → Environments
    # (decaf.canary / decaf / mainnet.canary / mainnet). "Prevent self-review" must be
    # enabled on each so the requester cannot approve their own promotion.
    environment: ${{ inputs.floating-tag }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - bridge
          - builder
          - cdn-broker
          - cdn-marshal
          - cdn-whitelist
          - deploy
          - espresso-dev-node
          - nasty-client
          - node-validator
          - orchestrator
          - prover-service
          - espresso-node
          - staking-cli
          - state-relay-server
          - submit-transactions
    steps:
      - name: Login to Github Container Repo
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/login-action@v3
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: docker/setup-buildx-action@v3
          attempt_limit: 3
          attempt_delay: 10000

      - name: Re-tag image
        env:
          SERVICE: ${{ matrix.service }}
          FLOATING_DOCKER_TAG: ${{ inputs.floating-tag }}
          RELEASE_GIT_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools create -t "$REGISTRY/$SERVICE:$FLOATING_DOCKER_TAG" "$REGISTRY/$SERVICE:$RELEASE_GIT_TAG"
