# Manual fallback for creating X.Y.Z.N tags + GitHub Releases.
#
# Normal flow is `/tag` on the release tracker issue (see tag-release.yml).
# This workflow exists for emergencies where you need to tag a specific
# commit / ref without going through the tracker — e.g. retrofitting a tag,
# or tagging from a branch the tracker doesn't know about.

name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (must match MAJOR.MINOR.PHASE.PATCH, e.g. 0.4.0.5)"
        required: true
        type: string
      ref:
        description: "Branch or commit to tag (e.g. release-0.4.0, main, abc1234)"
        required: true
        type: string

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag format
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if ! echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag must match MAJOR.MINOR.PHASE.PATCH (e.g. 0.4.0.5)"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve ref to SHA
        id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          gh release create "$TAG" --target "$SHA" --generate-notes
