name: Lint

on:
  push:
    branches:
      - main
      - release-*
    tags:
      # YYYYMMDD
      - "20[0-9][0-9][0-1][0-9][0-3][0-9]*"
  pull_request:
    branches:
  workflow_dispatch:

concurrency:
  # ensure non-PR jobs run in parallel
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: "0"

jobs:
  cargo-fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt -- --check

  clippy-postgres:
    name: clippy (postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main'  }}
          shared-key: cargo-clippy

      - name: Run clippy
        run: |
          cargo clippy --workspace --exclude sequencer-sqlite --exclude espresso-dev-node --exclude espresso-crypto-helper --features testing --all-targets --keep-going -- -D warnings

  clippy-embedded:
      name: clippy (embedded-db)
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: Swatinem/rust-cache@v2
          with:
            save-if: false
            shared-key: cargo-clippy

        - name: Run clippy
          run: |
            cargo clippy --workspace --exclude espresso-crypto-helper --features "embedded-db testing" --all-targets --keep-going -- -D warnings

  # crypto-helper uses openssl = { features = ["vendored"] } for cross-compiling.
  # Cargo feature unification leaks "vendored" to the entire workspace, adding ~3min
  # to compile openssl from source. Lint it separately to keep it isolated.
  clippy-crypto-helper:
      name: clippy (crypto-helper)
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: Swatinem/rust-cache@v2
          with:
            save-if: false
            shared-key: cargo-clippy

        - name: Run clippy
          run: |
            cargo clippy -p espresso-crypto-helper --all-targets --keep-going -- -D warnings
