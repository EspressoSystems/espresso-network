name: HotShot integration tests

on:
  push:
    branches:
      - "main"
  pull_request:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  # ensure non-PR jobs run in parallel
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - id: set-matrix
        run: echo "matrix=$(just hotshot::matrix)" >> "$GITHUB_OUTPUT"

  test:
    needs: build-matrix
    strategy:
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout Repository

      - uses: Swatinem/rust-cache@v2
        name: Enable Rust Caching
        with:
          shared-key: "hotshot-tests"
          cache-on-failure: "true"
          save-if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-')) && matrix.test_suites == 'test-ci-rest' }}
          prefix-key: v1-hotshot

      - uses: taiki-e/install-action@just

      - uses: taiki-e/install-action@nextest

      - name: Show memory
        run: free -h

      - name: Build integration tests
        run: |
          just hotshot::${{ matrix.test_suites }} --no-run
        timeout-minutes: 60

      - name: Run integration tests
        run: |
          just hotshot::${{ matrix.test_suites }} --no-fail-fast
        timeout-minutes: 60
        env:
          RUST_BACKTRACE: full

      - name: Sanitize artifact name
        if: always()
        id: artifact-name
        run: |
          name="nextest-junit-hotshot-$(echo '${{ matrix.test_suites }}' | tr ' /' '--')"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          if-no-files-found: ignore
          path: target/nextest/*/junit.xml

  test-new-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout Repository

      - uses: Swatinem/rust-cache@v2
        name: Enable Rust Caching
        with:
          shared-key: "hotshot-tests"
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-') }}
          prefix-key: v1-hotshot

      - uses: taiki-e/install-action@nextest

      - name: Build tests
        run: |
          cargo nextest run -p hotshot-new-protocol --no-run
        timeout-minutes: 60

      - name: Run tests
        run: |
          cargo nextest run -p hotshot-new-protocol --no-fail-fast
        timeout-minutes: 30
        env:
          RUST_BACKTRACE: full

      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-hotshot-new-protocol
          if-no-files-found: ignore
          path: target/nextest/*/junit.xml

  test-examples:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout Repository

      - uses: Swatinem/rust-cache@v2
        name: Enable Rust Caching
        with:
          shared-key: "hotshot-tests"
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-') }}
          prefix-key: v1-hotshot

      - uses: taiki-e/install-action@just

      - name: Test examples
        run: |
          just hotshot::example all-push-cdn -- --config_file ./crates/hotshot/orchestrator/run-config.toml
        timeout-minutes: 20

  nextest-report:
    needs: [test, test-new-protocol]
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nextest-junit-*
          path: junit-artifacts

      - name: Render summary
        run: |
          python3 scripts/nextest-summary junit-artifacts \
            --title "Nextest (hotshot)" \
            --pr-comment-out junit-artifacts/pr-comment.md \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Post/update PR comment
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: nextest-hotshot
          path: junit-artifacts/pr-comment.md
          delete: ${{ hashFiles('junit-artifacts/pr-comment.md') == '' }}

  # This job enables having a single required status check in github for all hotshot tests.
  aggregate-hotshot-tests:
    needs: [test, test-new-protocol, test-examples, nextest-report]
    runs-on: ubuntu-latest
    # explicitly run and fail the job if dependencies failed
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Aggregate hotshot test results
        run: |
          # useful for debugging
          echo "All results: ${{ toJson(needs) }}"

          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more jobs failed."
            exit 1
          else
            echo "All jobs succeeded."
            exit 0
          fi
