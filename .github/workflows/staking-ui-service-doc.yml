name: staking-ui-service Doc

on:
  push:
    branches:
      - main
      - release-*
    tags:
      # YYYYMMDD
      - "20[0-9][0-9][0-1][0-9][0-3][0-9]*"
  pull_request:
    paths:
      - "crates/staking-ui-service/**"
      - ".github/workflows/staking-ui-service-doc.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: crates/staking-ui-service

jobs:
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main'  }}
          shared-key: staking-ui-service-doc
      - uses: extractions/setup-just@v3

      - name: Generate documentation
        run: just doc
