# Keep the release tracker issue body in sync, and handle /promote commands
# posted as comments.
#
# The actual logic lives in scripts/release-tracker.py; this workflow is the
# event wiring.

name: Update Release Tracker

on:
  push:
    branches:
      - main
      - "release-*"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+"
  pull_request_target:
    types: [closed]
    branches:
      - main
      - "release-*"
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["Promote Docker Tag"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: write
  pull-requests: read
  packages: read

jobs:
  # ----- Refresh on repo events (push, PR close, tag push) -------------------
  refresh:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh every open tracker issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          issues=$(gh issue list --label release-tracker --state open --json number -q '.[].number')
          for issue in $issues; do
            python3 scripts/release-tracker.py --issue "$issue" refresh || \
              echo "::warning::refresh failed for issue #$issue"
          done

  # ----- Handle /promote on tracker issues -----------------------------------
  promote:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'release-tracker') &&
      startsWith(github.event.comment.body, '/promote')
    runs-on: ubuntu-latest
    steps:
      - name: Gate on author association
        env:
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          set -euo pipefail
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *)
              echo "::error::commenter (${ASSOC}) lacks write access"
              exit 1
              ;;
          esac

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Dispatch /promote
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          BODY: ${{ github.event.comment.body }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          stage=$(printf '%s' "$BODY" | head -n1 | awk '{print $2}')
          if [ -z "$stage" ]; then
            gh issue comment "$ISSUE" --body "@$ACTOR \`/promote\` requires a stage (one of: decaf.canary, decaf, mainnet.canary, mainnet)"
            exit 1
          fi
          # Read release branch from tracker body
          body=$(gh issue view "$ISSUE" --json body -q .body)
          branch=$(printf '%s' "$body" | grep -oE 'release-branch: release-[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | sed 's|release-branch: ||')
          version="${branch#release-}"
          # Latest tag by creatordate
          tag=$(git tag --list "${version}.*" --sort=-creatordate | head -n1)
          if [ -z "$tag" ]; then
            gh issue comment "$ISSUE" --body "@$ACTOR no tags on \`$branch\` yet — run \`/tag\` before promoting."
            exit 0
          fi
          gh workflow run promote-docker-tag.yml \
            -f floating-tag="$stage" -f release-tag="$tag"
          gh issue comment "$ISSUE" --body \
            "@$ACTOR dispatched promotion of \`$tag\` → \`$stage\`. Approve at https://github.com/${GH_REPO}/actions/workflows/promote-docker-tag.yml."

  # ----- Refresh promotion state when promote-docker-tag.yml finishes --------
  on-promotion:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh promotion state across all open trackers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          issues=$(gh issue list --label release-tracker --state open --json number -q '.[].number')
          for issue in $issues; do
            python3 scripts/release-tracker.py --issue "$issue" refresh || \
              echo "::warning::refresh failed for issue #$issue"
          done
