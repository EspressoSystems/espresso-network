# Keep the release tracker issue body in sync, and handle /promote commands.
#
# The body is regenerated from scratch on every refresh. The only state
# preserved across refreshes:
#   - cursor markers (where we left off on main and the release branch)
#   - which checkboxes have been ticked (`- [x]`)
#   - everything below `<!-- HUMAN NOTES BELOW -->` is copied verbatim

name: Update Release Tracker

on:
  push:
    branches: [main, "release-*"]
    tags: ["[0-9]+.[0-9]+.[0-9]+.[0-9]+"]
  pull_request_target:
    types: [closed]
    branches: [main, "release-*"]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["Promote Docker Tag"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: write
  pull-requests: read
  packages: read

env:
  REGISTRY: ghcr.io/espressosystems/espresso-network
  REF_SERVICE: espresso-node

jobs:
  refresh:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0, fetch-tags: true }

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh every open tracker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          digest() {
            docker buildx imagetools inspect --raw "$REGISTRY/$REF_SERVICE:$1" 2>/dev/null \
              | jq -r '.manifests[]? | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' \
              || true
          }

          refresh() {
            local issue="$1"
            echo "::group::refresh issue #$issue"
            local body; body=$(gh issue view "$issue" --json body -q .body)

            local version main_cur branch_cur head_main head_branch
            version=$(grep -oP '(?<=release-branch: release-)[0-9]+\.[0-9]+\.[0-9]+' <<<"$body" | head -1)
            if [ -z "$version" ]; then
              echo "::error::tracker #$issue body missing release-branch marker"
              echo "::endgroup::"; return 1
            fi
            main_cur=$(grep -oP '(?<=main-cursor: )[0-9a-f]+|(?<=main-cursor: )none' <<<"$body" | head -1)
            branch_cur=$(grep -oP '(?<=branch-cursor: )[0-9a-f]+|(?<=branch-cursor: )none' <<<"$body" | head -1)
            # cut-from / cut-date set once at branch creation; preserved verbatim.
            local cut_from cut_date
            cut_from=$(grep -oP '(?<=cut-from: )[0-9a-f]+|(?<=cut-from: )unknown' <<<"$body" | head -1)
            cut_date=$(grep -oP '(?<=cut-date: ).+' <<<"$body" | head -1)
            echo "version=$version main_cur=${main_cur:-<empty>} branch_cur=${branch_cur:-<empty>}"
            git fetch origin main "release-$version"
            head_main=$(git rev-parse origin/main)
            head_branch=$(git rev-parse "origin/release-$version")
            echo "head_main=$head_main head_branch=$head_branch"

            # Post a per-push comment summarizing new commits, so /tag commands
            # appear in chronological context with the work they cover.
            post_push_comment() {
              local ref="$1" old="$2" new="$3" label="$4"
              [ "${GITHUB_EVENT_NAME:-}" = "push" ] || return 0
              [ "${GITHUB_REF:-}" = "$ref" ] || return 0
              [ "$old" != "none" ] && [ -n "$old" ] || return 0
              git merge-base --is-ancestor "$old" "$new" 2>/dev/null || return 0
              local pushed
              pushed=$(git log "$old..$new" --no-merges --reverse \
                --pretty="- [\`%h\`](https://github.com/$GH_REPO/commit/%H) %s")
              [ -n "$pushed" ] || return 0
              local count; count=$(printf '%s\n' "$pushed" | wc -l)
              printf '@%s pushed %d commit(s) to `%s`:\n\n%s\n' \
                "${GITHUB_ACTOR:-someone}" "$count" "$label" "$pushed" \
                > "$RUNNER_TEMP/push-comment.md"
              gh issue comment "$issue" --body-file "$RUNNER_TEMP/push-comment.md" || true
            }
            post_push_comment "refs/heads/release-$version" "$branch_cur" "$head_branch" "release-$version"
            post_push_comment "refs/heads/main"             "$main_cur"   "$head_main"   "main"

            # Set of full shas the user has ticked, used to preserve ticks.
            local ticked
            ticked=$(grep -oP '(?<=- \[x\] `)[a-f0-9]+(?=`.* sha: )' <<<"$body" || true)

            # Look up the backport PR (if any) for a given source PR number
            # targeting this release branch. Echoes "<num>\t<state>\t<url>" or "".
            backport_lookup() {
              local pr_num="$1" bp_branch="backport-${pr_num}-to-release-${version}"
              gh pr list --head "$bp_branch" --state all --limit 1 \
                --json number,state,url \
                -q '.[0] | select(.) | "\(.number)\t\(.state)\t\(.url)"' 2>/dev/null
            }

            # Render a row for one sha, optionally with backport status (BACKPORT only).
            render_row() {
              local full="$1" name="$2" short subj pr_num mark extra=""
              short=$(git rev-parse --short=8 "$full" 2>/dev/null) || return 0
              subj=$(git log -1 --format='%s' "$full" 2>/dev/null) || return 0
              pr_num=$(grep -oE '#[0-9]+\)$' <<<"$subj" | tr -d '#)')
              if [ "$name" = "BACKPORT" ] && [ -n "$pr_num" ]; then
                local bp; bp=$(backport_lookup "$pr_num")
                if [ -n "$bp" ]; then
                  local bp_num bp_state bp_url
                  IFS=$'\t' read -r bp_num bp_state bp_url <<<"$bp"
                  extra=" · backport: [#${bp_num}](${bp_url}) (${bp_state,,})"
                  [ "$bp_state" = "MERGED" ] && mark="x"
                else
                  extra=" · backport: _none_ — \`gh workflow run backport.yml -f pr_number=${pr_num} -f target_branch=release-${version}\`"
                fi
              fi
              if [ -z "${mark:-}" ]; then
                if [ -n "$ticked" ] && grep -qx "$full" <<<"$ticked"; then mark="x"; else mark=" "; fi
              fi
              local subj_esc=${subj//|/\\|}
              printf -- "- [%s] \`%s\` %s%s <!-- sha: %s -->\n" "$mark" "$short" "$subj_esc" "$extra" "$full"
            }

            # Re-render the full checklist each refresh: union of preserved shas
            # (so tick history survives) and new shas since cursor (so the list
            # grows append-only).
            checklist() {
              local cursor="$1" head="$2" name="$3" rewrite_notice=""
              local preserved_shas new_shas all_shas full out=""
              preserved_shas=$(awk -v n="$name" '
                $0 == "<!-- CHECKLIST " n " -->" { p=1; next }
                $0 == "<!-- END CHECKLIST -->" && p { exit }
                p && match($0, /<!-- sha: [a-f0-9]+ -->/) {
                  s=substr($0, RSTART+10, RLENGTH-14); print s
                }
              ' <<<"$body")
              if [ "$cursor" != "none" ] && git merge-base --is-ancestor "$cursor" "$head" 2>/dev/null; then
                new_shas=$(git log "$cursor..$head" --no-merges --reverse --pretty=%H)
              elif [ "$cursor" != "none" ]; then
                rewrite_notice="_Branch rewrite detected; checklist resumed from \`${head:0:8}\`._"
              fi
              all_shas=$(printf '%s\n%s\n' "$preserved_shas" "$new_shas" | awk 'NF && !seen[$0]++')
              while IFS= read -r full; do
                [ -z "$full" ] && continue
                out+=$(render_row "$full" "$name")
              done <<<"$all_shas"
              [ -n "$rewrite_notice" ] && out+="$rewrite_notice"$'\n'
              [ -z "$out" ] && out=$'_None yet._\n'
              printf '%s' "$out"
            }
            local backport_list forward_list
            backport_list=$(checklist "$main_cur"   "$head_main"   BACKPORT)
            forward_list=$(checklist "$branch_cur" "$head_branch" FORWARD)

            # Tag log.
            local tag_rows tag_log
            # For annotated tags, %(objectname:short) is the tag-object SHA; the
            # dereferenced commit lives at %(*objectname:short). Lightweight tags
            # point directly so %(*objectname) is empty and we fall back.
            tag_rows=$(git tag --list "${version}.*" --sort=-creatordate \
              --format='| `%(refname:short)` | %(creatordate:short) | `%(if)%(*objectname)%(then)%(*objectname:short)%(else)%(objectname:short)%(end)` |')
            if [ -z "$tag_rows" ]; then
              tag_log="_No tags yet._"
            else
              tag_log=$(printf '| Tag | Date | Commit |\n|---|---|---|\n%s' "$tag_rows")
            fi

            # Promotion state.
            local promo_table d t
            declare -A by_digest=()
            for t in $(git tag --list "${version}.*" --sort=-creatordate); do
              d=$(digest "$t")
              [ -n "$d" ] && [ -z "${by_digest[$d]:-}" ] && by_digest[$d]="$t"
            done
            promo_table=$'| Stage | Tag |\n|---|---|'
            for stage in decaf.canary decaf mainnet.canary mainnet; do
              d=$(digest "$stage")
              if   [ -z "$d" ];                  then promo_table+=$'\n'"| \`$stage\` | _none_ |"
              elif [ -n "${by_digest[$d]:-}" ];  then promo_table+=$'\n'"| \`$stage\` | \`${by_digest[$d]}\` |"
              else                                    promo_table+=$'\n'"| \`$stage\` | _(unrelated tag)_ |"
              fi
            done

            # Experimental branches.
            local exp_rows exp_table
            exp_rows=$(gh api "repos/$GH_REPO/branches" --paginate \
              --jq "[.[] | select(.name | startswith(\"release-$version/\"))] | sort_by(.name) | .[] | \"| [\`\(.name)\`](https://github.com/$GH_REPO/tree/\(.name)) | \`\(.commit.sha[0:8])\` |\"")
            if [ -z "$exp_rows" ]; then exp_table="_None._"
            else exp_table=$(printf '| Branch | Last commit |\n|---|---|\n%s' "$exp_rows")
            fi

            # Preserve human-notes region.
            local notes; notes=$(awk '/<!-- HUMAN NOTES BELOW -->/{p=1;next} p' <<<"$body")

            # Resolve subject for the cut-from line so the regenerated body
            # matches what setup-release-branch.yml produced.
            local cut_subject="" cut_short=""
            if [ -n "$cut_from" ] && [ "$cut_from" != "unknown" ]; then
              cut_subject=$(git log -1 --format='%s' "$cut_from" 2>/dev/null || true)
              cut_short=$(git rev-parse --short=8 "$cut_from" 2>/dev/null || true)
            fi

            # Write new body.
            local tmp; tmp=$(mktemp)
            {
              printf '%s\n' "<!-- release-branch: release-$version -->"
              [ -n "$cut_from" ] && printf '%s\n' "<!-- cut-from: $cut_from -->"
              [ -n "$cut_date" ] && printf '%s\n' "<!-- cut-date: $cut_date -->"
              printf '%s\n' "<!-- main-cursor: $head_main -->"
              printf '%s\n' "<!-- branch-cursor: $head_branch -->"
              echo
              printf '%s\n' "Tracker for [\`release-$version\`](https://github.com/$GH_REPO/tree/release-$version). Comment \`/tag\` to cut a tag, \`/promote <stage>\` to promote. See [RELEASES.md](https://github.com/$GH_REPO/blob/main/RELEASES.md)."
              echo
              if [ -n "$cut_from" ] && [ "$cut_from" != "unknown" ] && [ -n "$cut_short" ]; then
                printf '**Cut from** [`%s`](https://github.com/%s/commit/%s) on %s — %s\n\n' \
                  "$cut_short" "$GH_REPO" "$cut_from" "${cut_date:-?}" "${cut_subject:-?}"
              fi
              echo "## Tag log"; echo; printf '%s\n' "$tag_log"; echo
              echo "## Promotion state"; echo; printf '%s\n' "$promo_table"; echo
              echo "## Commits on \`main\`"; echo
              echo "<!-- CHECKLIST BACKPORT -->"
              printf '%s' "$backport_list"
              echo "<!-- END CHECKLIST -->"; echo
              echo "## Commits on \`release-$version\`"; echo
              echo "<!-- CHECKLIST FORWARD -->"
              printf '%s' "$forward_list"
              echo "<!-- END CHECKLIST -->"; echo
              echo "## Experimental branches"; echo; printf '%s\n' "$exp_table"; echo
              echo "<!-- HUMAN NOTES BELOW -->"
              [ -n "$notes" ] && printf '%s\n' "$notes"
            } > "$tmp"
            gh issue edit "$issue" --body-file "$tmp"
            rm -f "$tmp"
            echo "::endgroup::"
          }

          issues=$(gh issue list --label release-tracker --state open --json number -q '.[].number')
          if [ -z "$issues" ]; then
            echo "no open release-tracker issues; nothing to do"
          fi
          rc=0
          for issue in $issues; do
            refresh "$issue" || { echo "::error::refresh failed for #$issue"; rc=1; }
          done
          exit "$rc"

  promote:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'release-tracker') &&
      startsWith(github.event.comment.body, '/promote')
    runs-on: ubuntu-latest
    steps:
      - name: Gate on author association
        env:
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *) echo "::error::commenter ($ASSOC) lacks write access"; exit 1 ;;
          esac

      - uses: actions/checkout@v6
        with: { fetch-depth: 0, fetch-tags: true }

      - name: Dispatch /promote
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          BODY: ${{ github.event.comment.body }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          stage=$(awk '{print $2; exit}' <<<"$BODY")
          case "$stage" in
            decaf.canary|decaf|mainnet.canary|mainnet) ;;
            *)
              gh issue comment "$ISSUE" --body "@$ACTOR \`/promote\` needs a valid stage (decaf.canary, decaf, mainnet.canary, mainnet); got \`${stage:-(empty)}\`."
              exit 1
              ;;
          esac
          body=$(gh issue view "$ISSUE" --json body -q .body)
          version=$(grep -oP '(?<=release-branch: release-)[0-9]+\.[0-9]+\.[0-9]+' <<<"$body" | head -1)
          tag=$(git tag --list "${version}.*" --sort=-creatordate | head -1)
          if [ -z "$tag" ]; then
            gh issue comment "$ISSUE" --body "@$ACTOR no tags on \`release-$version\` yet — run \`/tag\` before promoting."
            exit 0
          fi
          gh workflow run promote-docker-tag.yml -f floating-tag="$stage" -f release-tag="$tag"
          gh issue comment "$ISSUE" --body \
            "@$ACTOR dispatched promotion of \`$tag\` → \`$stage\`. Approve at https://github.com/$GH_REPO/actions/workflows/promote-docker-tag.yml."
