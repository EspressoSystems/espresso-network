# Keep the release tracker issue body in sync, and handle /promote commands.
#
# The body is a pure projection. All authoritative state lives outside the
# body in sources that are append-only or immutable:
#   - which release this tracker belongs to → the issue title ("Release X.Y.Z")
#   - cut-from commit → the `X.Y.Z.0` tag (created at branch setup)
#   - "this commit was considered" ticks → /skip /done /unskip issue comments
#   - everything below `<!-- HUMAN NOTES BELOW -->` is preserved verbatim
# Everything else (tag log, promotion state, candidate lists, experimental
# branches) is recomputed from git / GHCR / the GitHub API each refresh.

name: Update Release Tracker

on:
  push:
    branches: [main, "release-*"]
    tags: ["[0-9]+.[0-9]+.[0-9]+.[0-9]+"]
  pull_request_target:
    types: [closed]
    branches: [main, "release-*"]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["Promote Docker Tag"]
    types: [completed]
  # Lets tag-release.yml dispatch a refresh after pushing a tag: GITHUB_TOKEN
  # pushes don't fire push/tag events on other workflows.
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write
  pull-requests: read
  packages: read

env:
  REGISTRY: ghcr.io/espressosystems/espresso-network
  REF_SERVICE: espresso-node

jobs:
  refresh:
    # Non-comment events always refresh. Comment events refresh only when the
    # comment is a tick-state command — /promote and /tag have dedicated jobs
    # which fan out via workflow_dispatch.
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request == null &&
       contains(github.event.issue.labels.*.name, 'release-tracker') &&
       (startsWith(github.event.comment.body, '/skip ') ||
        startsWith(github.event.comment.body, '/done ') ||
        startsWith(github.event.comment.body, '/unskip ')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0, fetch-tags: true }

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh every open tracker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Exact prior tip of the pushed ref. Empty for non-push events; the
          # all-zero SHA on first push of a brand-new branch. Used as the
          # baseline for per-push notification comments.
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # ===== leaf helpers =====

          # Parse a PR number out of a squash-merge subject ending in `(#N)`.
          # Empty for merge-commit / direct-push subjects.
          pr_num_in() {
            [[ "$1" =~ \#([0-9]+)\)$ ]] && printf '%s' "${BASH_REMATCH[1]}"
          }

          # Suppress GitHub's auto-link of `#N` → "#N PR Title", which would
          # duplicate the visible subject text in rendered rows.
          escape_pr_refs() {
            printf '%s' "${1//\#/\\#}"
          }

          commit_url() {
            printf 'https://github.com/%s/commit/%s' "$GH_REPO" "$1"
          }

          docker_amd64_digest() {
            docker buildx imagetools inspect --raw "$REGISTRY/$REF_SERVICE:$1" 2>/dev/null \
              | jq -r '.manifests[]? | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' \
              2>/dev/null || true
          }

          # Echoes SHAs on $head whose patch already exists on $other. Used to
          # auto-tick clean backports/forward-ports — patch-id matching is
          # robust against squash-merge SHA changes.
          patches_already_on() {
            git cherry "$1" "$2" 2>/dev/null | awk '/^- / {print $2}' || true
          }

          # Echoes "<num>\t<state>\t<url>" of the backport PR for source PR $1
          # targeting release-$2, or nothing if none exists.
          backport_pr_for() {
            gh pr list --head "backport-${1}-to-release-${2}" --state all --limit 1 \
              --json number,state,url \
              -q '.[0] | select(.) | "\(.number)\t\(.state)\t\(.url)"' 2>/dev/null || true
          }

          # Resolve the cut-from commit: the `X.Y.Z.0` tag if present (written
          # by setup-release-branch.yml), else the merge-base with main as a
          # backwards-compat fallback. Empty if neither.
          resolve_anchor() {
            local version="$1" sha
            sha=$(git rev-parse --verify "refs/tags/$version.0^{commit}" 2>/dev/null) || true
            [ -n "$sha" ] || sha=$(git merge-base "origin/release-$version" origin/main 2>/dev/null) || true
            printf '%s' "$sha"
          }

          # Full SHAs that the tracker's /skip /done /unskip comment history
          # currently marks as "considered". Walks comments chronologically
          # and lets later commands override earlier ones for the same sha.
          ticked_from_comments() {
            gh issue view "$1" --json comments --jq '
              [.comments[].body
                | capture("^/(?<cmd>skip|done|unskip)\\s+(?<sha>[0-9a-f]{4,40})") // empty]
              | reduce .[] as $c ({};
                  if $c.cmd == "unskip" then del(.[$c.sha]) else .[$c.sha] = true end)
              | keys[]
            ' 2>/dev/null \
              | while IFS= read -r ref; do
                  [ -n "$ref" ] || continue
                  git rev-parse --verify "$ref^{commit}" 2>/dev/null || true
                done
          }

          # ===== section renderers (stdout = section body, no trailing \n) =====

          render_tag_log() {
            local version="$1" rows
            # Annotated tags carry their commit SHA at %(*objectname);
            # lightweight tags don't, and %(objectname) is the commit directly.
            rows=$(git tag --list "${version}.*" --sort=-creatordate --format="\
          | \`%(refname:short)\` \
          | %(creatordate:short) \
          | [\`%(if)%(*objectname)%(then)%(*objectname:short)%(else)%(objectname:short)%(end)\`](https://github.com/$GH_REPO/commit/%(if)%(*objectname)%(then)%(*objectname)%(else)%(objectname)%(end)) |")
            if [ -z "$rows" ]; then
              printf '_No tags yet._'
            else
              printf '| Tag | Date | Commit |\n|---|---|---|\n%s' "$rows"
            fi
          }

          render_promotion_state() {
            local version="$1" tag digest
            declare -A tag_for_digest=()
            for tag in $(git tag --list "${version}.*" --sort=-creatordate); do
              digest=$(docker_amd64_digest "$tag")
              [ -n "$digest" ] && [ -z "${tag_for_digest[$digest]:-}" ] && tag_for_digest[$digest]="$tag"
            done
            printf '| Stage | Tag |\n|---|---|'
            local stage
            for stage in decaf.canary decaf mainnet.canary mainnet; do
              digest=$(docker_amd64_digest "$stage")
              if [ -z "$digest" ]; then
                printf '\n| `%s` | _none_ |' "$stage"
              elif [ -n "${tag_for_digest[$digest]:-}" ]; then
                printf '\n| `%s` | `%s` |' "$stage" "${tag_for_digest[$digest]}"
              else
                printf '\n| `%s` | _(unrelated tag)_ |' "$stage"
              fi
            done
          }

          render_experimental_branches() {
            local version="$1" rows
            rows=$(gh api "repos/$GH_REPO/branches" --paginate \
              --jq "[.[] | select(.name | startswith(\"release-$version/\"))] | sort_by(.name) | .[] | \"| [\`\(.name)\`](https://github.com/$GH_REPO/tree/\(.name)) | \`\(.commit.sha[0:8])\` |\"" \
              2>/dev/null || true)
            if [ -z "$rows" ]; then
              printf '_None._'
            else
              printf '| Branch | Last commit |\n|---|---|\n%s' "$rows"
            fi
          }

          # Render one checklist row. Stdout = the row, no trailing newline (caller adds it).
          render_row() {
            local kind="$1" sha="$2" version="$3" ticked="$4" landed="$5"
            local short subj pr_num mark='' extra=''

            short=$(git rev-parse --short=8 "$sha" 2>/dev/null) || return 0
            subj=$(git log -1 --format='%s' "$sha" 2>/dev/null) || return 0
            pr_num=$(pr_num_in "$subj")

            # Backport-PR status only shown in the "Commits on main" section.
            if [ "$kind" = BACKPORT ] && [ -n "$pr_num" ]; then
              local bp bp_num bp_state bp_url
              bp=$(backport_pr_for "$pr_num" "$version")
              if [ -n "$bp" ]; then
                IFS=$'\t' read -r bp_num bp_state bp_url <<<"$bp"
                extra=" · backport: [#$bp_num]($bp_url) (${bp_state,,})"
                [ "$bp_state" = MERGED ] && mark=x
              fi
            fi

            # Auto-tick if the patch is already on the other branch.
            if [ -z "$mark" ] && grep -qxF "$sha" <<<"$landed"; then mark=x; fi
            # Manual tick via /skip or /done comment.
            if [ -z "$mark" ] && grep -qxF "$sha" <<<"$ticked"; then mark=x; fi
            : "${mark:= }"

            printf -- '- [%s] [`%s`](%s) %s%s' \
              "$mark" "$short" "$(commit_url "$sha")" "$(escape_pr_refs "$subj")" "$extra"
          }

          render_checklist() {
            local kind="$1" anchor="$2" head="$3" version="$4" ticked="$5" landed="$6"

            if [ -z "$anchor" ]; then
              printf '_No anchor for `release-%s` — branch creation never tagged it._' "$version"
              return
            fi
            if ! git merge-base --is-ancestor "$anchor" "$head" 2>/dev/null; then
              printf '_Anchor `%s` is no longer reachable from `%s` (branch rewritten?)._' \
                "${anchor:0:8}" "${head:0:8}"
              return
            fi

            local out='' sha
            while IFS= read -r sha; do
              [ -z "$sha" ] && continue
              out+=$(render_row "$kind" "$sha" "$version" "$ticked" "$landed")$'\n'
            done < <(git log "$anchor..$head" --no-merges --reverse --pretty=%H)
            [ -n "$out" ] || out=$'_None yet._\n'
            printf '%s' "$out"
          }

          # Post a per-push notification comment listing the new commits.
          # Main-branch pushes get a copy-paste backport command per commit.
          # Baseline is `github.event.before` (exact event tip); first push of
          # a brand-new branch sends nothing — that case is already documented
          # by the "Cut from" line at refresh time.
          post_push_comment() {
            local issue="$1" expected_ref="$2" label="$3" new="$4" version="$5"
            [ "${GITHUB_EVENT_NAME:-}" = push ] || return 0
            [ "${GITHUB_REF:-}" = "$expected_ref" ] || return 0
            local zero=0000000000000000000000000000000000000000
            [ -n "${PUSH_BEFORE:-}" ] && [ "$PUSH_BEFORE" != "$zero" ] || return 0
            git merge-base --is-ancestor "$PUSH_BEFORE" "$new" 2>/dev/null || return 0

            local is_main=0
            [ "$expected_ref" = refs/heads/main ] && is_main=1

            local rows='' count=0 sha short subj pr
            while IFS=$'\t' read -r sha short subj; do
              [ -z "$sha" ] && continue
              rows+="- [\`$short\`]($(commit_url "$sha")) $(escape_pr_refs "$subj")"$'\n'
              if [ "$is_main" = 1 ]; then
                pr=$(pr_num_in "$subj")
                [ -n "$pr" ] && rows+="  - To backport: \`gh workflow run backport.yml -f pr_number=$pr -f target_branch=release-$version\`"$'\n'
              fi
              count=$((count + 1))
            done < <(git log "$PUSH_BEFORE..$new" --no-merges --reverse --pretty='%H%x09%h%x09%s')
            [ "$count" -gt 0 ] || return 0

            local file="$RUNNER_TEMP/push-comment.md"
            printf '@%s pushed %d commit(s) to `%s`:\n\n%s' \
              "${GITHUB_ACTOR:-someone}" "$count" "$label" "$rows" > "$file"
            gh issue comment "$issue" --body-file "$file" || true
          }

          # ===== per-tracker orchestration =====

          refresh_tracker() {
            local issue="$1"
            echo "::group::refresh issue #$issue"

            local title body version
            title=$(gh issue view "$issue" --json title -q .title)
            body=$(gh issue view "$issue" --json body -q .body)
            # Title is "Release X.Y.Z" by setup-release-branch.yml convention.
            if [[ "$title" =~ ^Release[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              version="${BASH_REMATCH[1]}"
            else
              echo "::error::tracker #$issue title '$title' isn't 'Release X.Y.Z'"
              echo "::endgroup::"
              return 1
            fi

            git fetch --quiet --tags origin main "release-$version"

            local head_main head_branch anchor
            head_main=$(git rev-parse origin/main)
            head_branch=$(git rev-parse "origin/release-$version")
            anchor=$(resolve_anchor "$version")
            echo "version=$version anchor=${anchor:-<none>} head_main=$head_main head_branch=$head_branch"

            post_push_comment "$issue" refs/heads/main                main                "$head_main"   "$version"
            post_push_comment "$issue" "refs/heads/release-$version"  "release-$version"  "$head_branch" "$version"

            local ticked landed_on_branch landed_on_main
            ticked=$(ticked_from_comments "$issue")
            landed_on_branch=$(patches_already_on "$head_branch" "$head_main")
            landed_on_main=$(patches_already_on "$head_main" "$head_branch")

            local backport_list forward_list tag_log promo_state exp_table notes
            backport_list=$(render_checklist BACKPORT "$anchor" "$head_main"   "$version" "$ticked" "$landed_on_branch")
            forward_list=$(render_checklist  FORWARD  "$anchor" "$head_branch" "$version" "$ticked" "$landed_on_main")
            tag_log=$(render_tag_log "$version")
            promo_state=$(render_promotion_state "$version")
            exp_table=$(render_experimental_branches "$version")
            notes=$(awk '/<!-- HUMAN NOTES BELOW -->/{p=1;next} p' <<<"$body")

            local anchor_short='' anchor_date='' anchor_subject=''
            if [ -n "$anchor" ]; then
              anchor_short=$(git rev-parse --short=8 "$anchor")
              anchor_date=$(TZ=UTC git log -1 --format='%cd' --date='format:%Y-%m-%d %H:%M UTC' "$anchor")
              anchor_subject=$(git log -1 --format='%s' "$anchor")
            fi

            local tmp; tmp=$(mktemp)
            {
              printf 'Tracker for [`release-%s`](https://github.com/%s/tree/release-%s). ' "$version" "$GH_REPO" "$version"
              printf 'Comment `/tag` to cut a tag, `/promote <stage>` to promote, `/skip <sha>` or `/done <sha>` to mark a commit as handled, `/unskip <sha>` to undo. See [RELEASES.md](https://github.com/%s/blob/main/RELEASES.md).\n\n' "$GH_REPO"
              if [ -n "$anchor" ]; then
                printf '**Cut from** [`%s`](%s) on %s — %s\n\n' \
                  "$anchor_short" "$(commit_url "$anchor")" "$anchor_date" "$(escape_pr_refs "$anchor_subject")"
              fi
              printf '## Tag log\n\n%s\n\n' "$tag_log"
              printf '## Promotion state\n\n%s\n\n' "$promo_state"
              printf '## Commits on `main`\n\n%s\n' "$backport_list"
              printf '## Commits on `release-%s`\n\n%s\n' "$version" "$forward_list"
              printf '## Experimental branches\n\n%s\n\n' "$exp_table"
              printf '<!-- HUMAN NOTES BELOW -->\n'
              [ -n "$notes" ] && printf '%s\n' "$notes"
            } > "$tmp"
            gh issue edit "$issue" --body-file "$tmp"
            rm -f "$tmp"
            echo "::endgroup::"
          }

          # ===== main =====

          mapfile -t issues < <(gh issue list --label release-tracker --state open --json number -q '.[].number')
          if [ "${#issues[@]}" -eq 0 ]; then
            echo "no open release-tracker issues; nothing to do"
            exit 0
          fi
          rc=0
          for issue in "${issues[@]}"; do
            refresh_tracker "$issue" || { echo "::error::refresh failed for #$issue"; rc=1; }
          done
          exit "$rc"

  promote:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'release-tracker') &&
      startsWith(github.event.comment.body, '/promote')
    runs-on: ubuntu-latest
    steps:
      - name: Gate on author association
        env:
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *) echo "::error::commenter ($ASSOC) lacks write access"; exit 1 ;;
          esac

      - uses: actions/checkout@v6
        with: { fetch-depth: 0, fetch-tags: true }

      - name: Dispatch /promote
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          BODY: ${{ github.event.comment.body }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          stage=$(awk '{print $2; exit}' <<<"$BODY")
          case "$stage" in
            decaf.canary|decaf|mainnet.canary|mainnet) ;;
            *)
              gh issue comment "$ISSUE" --body "@$ACTOR \`/promote\` needs a valid stage (decaf.canary, decaf, mainnet.canary, mainnet); got \`${stage:-(empty)}\`."
              exit 1
              ;;
          esac
          body=$(gh issue view "$ISSUE" --json body -q .body)
          version=$(grep -oP '(?<=release-branch: release-)[0-9]+\.[0-9]+\.[0-9]+' <<<"$body" | head -1)
          tag=$(git tag --list "${version}.*" --sort=-creatordate | head -1)
          if [ -z "$tag" ]; then
            gh issue comment "$ISSUE" --body "@$ACTOR no tags on \`release-$version\` yet — run \`/tag\` before promoting."
            exit 0
          fi
          gh workflow run promote-docker-tag.yml -f floating-tag="$stage" -f release-tag="$tag"
          gh issue comment "$ISSUE" --body \
            "@$ACTOR dispatched promotion of \`$tag\` → \`$stage\`. Approve at https://github.com/$GH_REPO/actions/workflows/promote-docker-tag.yml."
