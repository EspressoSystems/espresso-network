vid = { path = "vid", features = ["parallel", "keccak256"] }
warp = { version = "0.4", features = ["server"] }
zeroize = "1.7"

[workspace.lints.clippy]
# may prevent accidental deadlocks from holding guards over match statments
significant_drop_in_scrutinee = "warn"

[profile.dev]
strip = "none"
debug = "line-tables-only"

[profile.dev-debug]
inherits = "dev"
strip = "none"
debug = "full"

# Workspace crates: opt-level 0 (not cached on CI, recompile every run).
# Dependencies: opt-level 1 via "*" (cached on CI, rarely recompile).
# Consensus crates: opt-level 1 (hotshot tests fail with too many failed views at opt-level 0).
# ZK-heavy crates: opt-level 3 (tests too slow without optimization).
[profile.test]
opt-level = 0

[profile.test.package."*"]
opt-level = 1
[profile.test.package.hotshot]
opt-level = 1
[profile.test.package.hotshot-types]
opt-level = 1
[profile.test.package.hotshot-task-impls]
opt-level = 1
[profile.test.package.hotshot-task]
opt-level = 1
[profile.test.package.hotshot-example-types]
opt-level = 1
[profile.test.package.espresso-types]
opt-level = 1
[profile.test.package.vid]
opt-level = 1
[profile.test.package.hotshot-builder-api]
opt-level = 1
[profile.test.package.hotshot-builder-legacy]
opt-level = 1
[profile.test.package.hotshot-utils]
opt-level = 1
[profile.test.package.hotshot-state-prover]
opt-level = 3
[profile.test.package.jf-merkle-tree]
opt-level = 3

[profile.test-docker]
inherits = "test"
strip = true
debug = "none"
