[workspace]
resolver = "2"
members = [
    "alloy-compat",
    "benchmark-stats",
    "client",
    "contracts/rust/adapter",
    "contracts/rust/deployer",
    "contracts/rust/diff-test",
    "contracts/rust/gen-vk-contract",
    "crates/builder",
    "crates/cliquenet",
    "crates/hotshot-builder/legacy",
    "crates/hotshot-builder/refactored",
    "crates/hotshot/builder-api",
    "crates/hotshot/example-types",
    "crates/hotshot/examples",
    "crates/hotshot/hotshot",
    "crates/hotshot/libp2p-networking",
    "crates/hotshot/macros",
    "crates/hotshot/orchestrator",
    "crates/hotshot/task",
    "crates/hotshot/task-impls",
    "crates/hotshot/testing",
    "crates/hotshot/types",
    "crates/hotshot/utils",
    "crates/versions",
    "espresso-dev-node",
    "hotshot-events-service",
    "hotshot-query-service",
    "hotshot-state-prover",
    "light-client",
    "light-client-query-service",
    "node-metrics",
    "request-response",
    "sdks/crypto-helper",
    "sequencer",
    "sequencer-sqlite",
    "slow-tests",
    "staking-cli",
    "test-utils",
    "tests",
    "types",
    "utils",
    "vid",
]

# All crates except sequencer-sqlite, espresso-dev-node, hotshot-examples, and crypto-helper.
# sequencer-sqlite/espresso-dev-node: embedded-db feature conflict
# hotshot-examples: no tests, only needed for manual testing via `just hotshot::example`
# crypto-helper: vendored openssl leaks to workspace via feature unification
default-members = [
    "alloy-compat",
    "benchmark-stats",
    "client",
    "contracts/rust/adapter",
    "contracts/rust/deployer",
    "contracts/rust/diff-test",
    "contracts/rust/gen-vk-contract",
    "crates/builder",
    "crates/cliquenet",
    "crates/hotshot/builder-api",
    "crates/hotshot/example-types",
    "crates/hotshot/hotshot",
    "crates/hotshot/libp2p-networking",
    "crates/hotshot/macros",
    "crates/hotshot/orchestrator",
    "crates/hotshot/task",
    "crates/hotshot/task-impls",
    "crates/hotshot/testing",
    "crates/hotshot/types",
    "crates/hotshot/utils",
    "crates/hotshot-builder/legacy",
    "crates/hotshot-builder/refactored",
    "hotshot-events-service",
    "hotshot-query-service",
    "hotshot-state-prover",
    "light-client",
    "light-client-query-service",
    "node-metrics",
    "request-response",
    "sequencer",
    "slow-tests",
    "staking-cli",
    "test-utils",
    "tests",
    "types",
    "utils",
    "vid",
]
exclude = ["sequencer-sqlite"]

[workspace.package]
version = "0.1.0"
authors = ["Espresso Systems <hello@espressosys.com>"]
edition = "2021"

[workspace.dependencies]
