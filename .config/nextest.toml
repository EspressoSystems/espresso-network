[profile.default]
# Kill tests after 3 periods of 2m, because they are probably hanging
slow-timeout = { period = "2m", terminate-after = 3 }
default-filter = 'not (deps(hotshot-testing) | package(tests) | package(slow-tests) | package(espresso-dev-node))'
retries = 2

[profile.default.junit]
path = "junit.xml"
store-failure-output = true
report-name = "nextest"

[[profile.default.overrides]]
# These tests are fast if they work (usually about 150ms) but sometimes they
# hang, especially when running Concurrently with other tests. Kill after a
# while and retry up to 10 times to avoid failing the test suite.
filter = """
test(test_process_client_handling_stream_subscribe_node_identity) |
test(test_process_client_handling_stream_subscribe_voters)
"""
slow-timeout = { period = "2s", terminate-after = 1 }
retries = 10

[[profile.default.overrides]]
filter = 'test(test_hotshot_event_streaming_epoch_progression)'
slow-timeout = { period = "8m", terminate-after = 4 }

[[profile.default.overrides]]
filter = 'test(test_pos_upgrade_view_based)'
slow-timeout = { period = "2m", terminate-after = 5 }

[[profile.default.overrides]]
filter = 'test(test_light_client_completeness)'
slow-timeout = { period = "2m", terminate-after = 15 }

# The restart tests run an entire sequencing network, and so are quite resource intensive.
[[profile.default.overrides]]
filter = 'test(slow_test_restart)'
slow-timeout = { period = "1m", terminate-after = 3 }
threads-required = 'num-cpus'

[[profile.default.overrides]]
filter = 'package(request-response)'
threads-required = 'num-cpus'

# HotShot integration tests
[profile.hotshot]
retries = 0
slow-timeout = { period = "2m", terminate-after = 2 }
default-filter = 'deps(hotshot-testing)'
final-status-level = "flaky"
threads-required = "num-test-threads"

[profile.hotshot.junit]
path = "junit.xml"
store-failure-output = true
report-name = "nextest"

# cross_tests! macro tests: use binary() not test(), because the macro names the
# binary after the file but the test function is always the base test name.
#
# Example: `cargo nextest list ..`
#     package:binary
#         test
#
#     hotshot-testing::test_epoch_success_overlap_3f:
#         test_epoch_success::testtypesrandomizedcommitteemembers_stablequorumfilterconfig_123_6__stablequorumfilterconfig_123_6___::cliquenetimpl_::test_epoch_success
[[profile.hotshot.overrides]]
filter = """
test(test_success_with_async_delay_with_epochs) |
test(test_success_with_async_delay_2_with_epochs) |
test(test_vid2_success) |
test(test_combined_network_half_dc) |
test(test_staggered_restart_first_block) |
test(/test_staggered_restart$/) |
binary(test_epoch_success_overlap_2_f) |
binary(test_epoch_success_overlap_3f) |
binary(test_epoch_success_types_randomized_leader)
"""
retries = 3

# New-protocol integration tests (crates/hotshot/new-protocol). Some restart
# and late-start tests have max_runtime up to 500s, so we give them more
# headroom than the default profile's 360s termination.
[profile.new-protocol]
slow-timeout = { period = "2m", terminate-after = 3 }
default-filter = 'package(hotshot-new-protocol)'
retries = 0

[profile.slow]
slow-timeout = "2m"
default-filter = 'package(espresso-dev-node) | package(slow-tests)'
retries = 2

[profile.all]
slow-timeout = "2m"
default-filter = 'all()'
retries = 2

[profile.integration]
slow-timeout = "2m"
default-filter = 'package(tests)'
retries = 2

[profile.integration.junit]
path = "junit.xml"
store-failure-output = true
report-name = "nextest"

